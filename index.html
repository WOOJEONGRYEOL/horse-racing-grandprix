<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>경마 그랑프리 🏇</title>
<style>
  :root{
    --felt:#0b5d2e; --felt2:#0a4e28; --gold:#f4c430;
    --panel:#0e2a19; --line:#1c5f38; --red:#ff5a5a; --p1:#37e6ff; --p2:#ff8a3d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"Trebuchet MS","Segoe UI",system-ui,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji",sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #14713b 0%, var(--felt) 45%, var(--felt2) 100%);
    color:#f4f7e8; display:flex; align-items:center; justify-content:center;
    min-height:100%; overflow:hidden; user-select:none;
  }
  #app{width:min(1160px,100vw); height:min(780px,100vh); position:relative;
    border-radius:14px; overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.5), inset 0 0 0 2px rgba(244,196,48,.25);
    background:linear-gradient(180deg,#0d3a20,#0a2c19);}
  .screen{position:absolute; inset:0; display:none; flex-direction:column;}
  .screen.active{display:flex;}
  h1{font-size:46px; margin:0; letter-spacing:1px; font-weight:900;
    display:inline-flex; align-items:center; justify-content:center; gap:.12em;}
  .gtxt{background:linear-gradient(180deg,#fff3b0,var(--gold) 60%,#c98a12);
    -webkit-background-clip:text; background-clip:text; color:transparent;}
  .sub{color:#bfe6c9; letter-spacing:3px; font-size:13px; text-transform:uppercase;}
  .center{align-items:center; justify-content:center; gap:20px; text-align:center; padding:24px;}

  /* ------- Start hero ------- */
  #screen-start{padding:0; align-items:stretch;}
  #heroWrap{position:relative; flex:1; min-height:0; overflow:hidden; background:#0a2c19;}
  #heroArt{width:100%; height:100%; display:block; object-fit:cover;}
  #heroOverlay{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding:8px 24px 22px; text-align:center;
    background:linear-gradient(180deg, rgba(8,20,12,0) 38%, rgba(8,20,12,.35) 68%, rgba(6,16,10,.72) 100%);}
  #startFooter{flex:none; display:flex; flex-direction:column; align-items:center; gap:10px; padding:16px 24px 20px;
    background:linear-gradient(180deg,#0a2c19,#0a2214);}
  .btn{cursor:pointer; border:none; border-radius:10px; padding:14px 22px; font-size:17px;
    font-weight:800; color:#0a2c19; background:linear-gradient(180deg,#ffe27a,var(--gold));
    box-shadow:0 4px 0 #b9860f, 0 8px 18px rgba(0,0,0,.35); transition:transform .05s;}
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 #b9860f;}
  .btn.alt{background:linear-gradient(180deg,#7fe9ff,#2ec5e6); color:#04303a; box-shadow:0 4px 0 #1183a0,0 8px 18px rgba(0,0,0,.35);}
  .btn.ghost{background:transparent; color:#cde6d6; box-shadow:inset 0 0 0 2px rgba(205,230,214,.4);}
  .btn:disabled{filter:grayscale(.6) brightness(.7); cursor:not-allowed;}
  .row{display:flex; gap:14px; flex-wrap:wrap; align-items:center; justify-content:center;}
  .hint{font-size:12px; opacity:.7;}

  /* ------- Betting ------- */
  #screen-bet{padding:12px 16px;}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .topbar h2{margin:0; font-size:22px; color:var(--gold);}
  .wallets{display:flex; gap:10px;}
  .wallet{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:6px 12px; font-weight:800; transition:box-shadow .3s;}
  .wallet small{display:block; font-weight:600; font-size:10px; letter-spacing:1px; opacity:.7;}
  .wallet.p1{border-color:var(--p1); color:#dff9ff;}
  .wallet.p2{border-color:var(--p2); color:#ffe6d3;}
  .wallet.flash-up{box-shadow:0 0 18px rgba(120,255,150,.8);}
  .wallet.flash-down{box-shadow:0 0 18px rgba(255,80,80,.8);}
  .card-list{display:grid; grid-template-columns:1fr 1fr; gap:10px; overflow:auto; padding:6px 4px 4px 2px; flex:1;}
  .horse-card{background:linear-gradient(180deg,#12351f,#0e2a19); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px; display:flex; gap:12px; align-items:center; position:relative; cursor:pointer;}
  .horse-card:hover{border-color:#3f9c63;}
  .hc-canvas{width:122px; height:80px; flex:none;
    background:radial-gradient(90px 34px at 50% 92%, rgba(0,0,0,.3), transparent), linear-gradient(180deg,#9db8c6,#7a9c6e 55%,#6d8b52); border-radius:8px;}
  .hc-body{flex:1; min-width:0;}
  .hc-name{font-weight:800; font-size:18px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .hc-jockey{font-size:13px; opacity:.9; margin-top:2px;}
  .hc-form{font-size:12px; opacity:.75; margin-top:3px; color:#bfe6c9;}
  .odds{font-weight:900; font-size:23px; color:var(--gold); text-align:right; flex:none;}
  .odds small{display:block; font-size:10px; color:#9fd7b0; font-weight:600;}
  .lane-no{position:absolute; top:5px; left:5px; width:20px; height:20px; border-radius:6px; font-size:12px; font-weight:800;
    display:flex; align-items:center; justify-content:center; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.6);}
  .horse-card.pick1{outline:3px solid var(--p1);}
  .horse-card.pick2{box-shadow:0 0 0 3px var(--p2);}
  .pickflags{position:absolute; top:-9px; right:8px; display:flex; gap:4px;}
  .pf{font-size:10px; font-weight:800; padding:2px 7px; border-radius:20px; color:#04160b;}

  .betbar{margin-top:8px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px 12px; max-height:38%; overflow:auto;}
  .betrow{display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-height:38px;}
  .betrow + .betrow{margin-top:6px; padding-top:6px; border-top:1px dashed var(--line);}
  .tag{font-weight:800; padding:4px 10px; border-radius:8px; font-size:13px; flex:none;}
  .tag.p1{background:rgba(55,230,255,.15); color:var(--p1);}
  .tag.p2{background:rgba(255,138,61,.15); color:var(--p2);}
  .chip{cursor:pointer; border:none; border-radius:8px; padding:7px 11px; font-weight:800; font-size:13px;
    background:#0a2c19; color:#cde6d6; box-shadow:inset 0 0 0 1px var(--line);}
  .chip:active{transform:translateY(2px);}
  .chip.type{padding:6px 10px;}
  .chip.type.on{background:var(--gold); color:#0a2c19; box-shadow:none;}
  .stake{min-width:104px; text-align:center; font-weight:900; font-size:17px; color:var(--gold);}
  .stake.pop{animation:pop .18s;}
  @keyframes pop{0%{transform:scale(1.35)}100%{transform:scale(1)}}
  .pickinfo{font-size:13px; opacity:.9;}
  .typedesc{font-size:11px; opacity:.55; width:100%;}

  /* ------- 마권 발권기 ------- */
  #ticketLayer{position:absolute; inset:0; pointer-events:none; z-index:40; display:flex; justify-content:center;}
  .tslot{position:absolute; top:60px; width:284px; height:16px; border-radius:8px;
    background:linear-gradient(180deg,#0a1f12,#123524);
    box-shadow:inset 0 3px 7px rgba(0,0,0,.75), 0 3px 10px rgba(0,0,0,.45);}
  .tmask{position:absolute; top:68px; width:264px; height:260px; overflow:hidden; display:flex; justify-content:center;}
  .ticket{position:relative; overflow:hidden; width:246px; height:fit-content; color:#22301f; border-radius:5px; padding:10px 13px 12px;
    font-family:ui-monospace,Menlo,monospace; font-size:11px; transform:translateY(-105%);
    background:
      radial-gradient(circle at 4px 50%, transparent 3px, #f7f3e2 3px) left/8px 100% no-repeat,
      repeating-linear-gradient(0deg,#f7f3e2 0 3px,#f1ecd6 3px 6px);
    box-shadow:0 8px 20px rgba(0,0,0,.5);}
  .tstamp{position:absolute; top:11px; right:-34px; width:150px; padding:3px 0; text-align:center;
    transform:rotate(38deg); font-weight:900; font-size:12px; letter-spacing:.5px; color:#fff;
    box-shadow:0 2px 5px rgba(0,0,0,.35); text-shadow:0 1px 1px rgba(0,0,0,.3);}
  .tstamp.p1{background:var(--p1); color:#04303a;}
  .tstamp.p2{background:var(--p2); color:#3a1f04;}
  .ticket.emerge{animation:emerge 1s steps(20) forwards;}
  @keyframes emerge{to{transform:translateY(0)}}
  .ticket.fly{animation:fly .55s cubic-bezier(.5,-.2,.8,.6) forwards;}
  @keyframes fly{to{transform:translateY(330px) scale(.22) rotate(7deg); opacity:0;}}
  .ticket h4{margin:0 0 5px; font-size:12px; text-align:center; letter-spacing:1px;
    border-bottom:1.5px dashed #8a8570; padding-bottom:5px;}
  .ticket .trow{display:flex; justify-content:space-between; padding:1.5px 0; gap:8px;}
  .ticket .trow span:last-child{text-align:right;}
  .ticket .big{font-size:13px; font-weight:800;}
  .ticket .tbar{margin-top:7px; height:26px;
    background:repeating-linear-gradient(90deg,#1b1b1b 0 2px,transparent 2px 4px,#1b1b1b 4px 5px,transparent 5px 9px,#1b1b1b 9px 12px,transparent 12px 14px);}
  .ticket .serial{text-align:center; opacity:.55; font-size:9px; margin-top:3px; letter-spacing:1px;}
  /* 경기 중 미니 마권 (클릭하면 확대) */
  #miniTickets{position:absolute; left:10px; top:10px; display:flex; flex-direction:column; gap:6px; z-index:6;}
  .mticket{background:linear-gradient(180deg,#f7f3e2,#efe9d2); color:#22301f; border-radius:5px; padding:4px 9px;
    font-family:ui-monospace,Menlo,monospace; font-size:10px; font-weight:700; cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,.4); border-left:4px solid var(--gold);}
  .mticket:hover{filter:brightness(1.06);}
  .mticket.mp1{border-left-color:var(--p1);} .mticket.mp2{border-left-color:var(--p2);}
  .mpTag{display:inline-block; font-weight:900; font-size:9px; padding:1px 5px; border-radius:4px; margin-right:1px;}
  .mp1t{background:var(--p1); color:#04303a;} .mp2t{background:var(--p2); color:#3a1f04;}
  #ticketZoom{position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    z-index:30; background:rgba(0,0,0,.5); cursor:pointer;}
  #ticketZoom.show{display:flex;}
  #ticketZoom .ticket{transform:none; width:280px; font-size:12px;}

  /* ------- Race (3단 레이아웃: HUD / 트랙 / 중계) ------- */
  #screen-race{background:#0a2417;}
  #raceHud{height:46px; flex:none; display:flex; align-items:center; gap:8px; padding:0 12px;
    background:linear-gradient(180deg,#08200f,#0a2c19); border-bottom:1px solid var(--line);}
  #hudInfo{display:flex; gap:14px; flex:none; font-weight:800; font-size:14px; align-items:baseline;}
  #hudInfo small{font-size:9px; opacity:.6; letter-spacing:1px; display:block; font-weight:600;}
  #rankStrip{position:relative; flex:1; height:32px; overflow:hidden; opacity:0; transition:opacity .8s;}
  #rankStrip.show{opacity:1;}
  .rchip{position:absolute; left:0; top:3px; width:142px; display:flex; align-items:center; gap:4px;
    background:rgba(10,44,25,.9); border:1px solid #1c4a2e; border-radius:6px; padding:3px 6px;
    font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden;
    transition:transform 1.15s cubic-bezier(.33,.85,.35,1);}
  .rchip .rk{font-weight:900; color:var(--gold); font-size:11.5px; min-width:24px; text-align:center; flex:none;}
  .rchip .lane{width:16px; height:16px; border-radius:4px; color:#fff; font-size:10px; font-weight:800;
    display:flex; align-items:center; justify-content:center; flex:none; text-shadow:0 1px 1px rgba(0,0,0,.5);}
  .rchip .nm{overflow:hidden; text-overflow:ellipsis; max-width:56px;}
  .bmk{font-size:9px; font-weight:800; border-radius:8px; padding:1px 5px; color:#04160b; flex:none;}
  .bmk.b1{background:var(--p1);} .bmk.b2{background:var(--p2);}
  .rchip.mine1{border-color:var(--p1); box-shadow:0 0 6px rgba(55,230,255,.4);}
  .rchip.mine2{border-color:var(--p2); box-shadow:0 0 6px rgba(255,138,61,.4);}
  #trackWrap{flex:1; position:relative; min-height:0;}
  #track{width:100%; height:100%; display:block;}
  #countdown{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:110px; font-weight:900; color:var(--gold); text-shadow:0 6px 30px rgba(0,0,0,.6); pointer-events:none;}
  #skipBtn{position:absolute; bottom:14px; right:14px; z-index:15; display:none; cursor:pointer;
    border:none; border-radius:22px; padding:11px 20px; font-size:15px; font-weight:800; color:#0a2c19;
    background:linear-gradient(180deg,#ffe27a,var(--gold)); box-shadow:0 4px 0 #b9860f, 0 8px 18px rgba(0,0,0,.4);
    animation:skipIn .3s;}
  #skipBtn.show{display:block;}
  #skipBtn:active{transform:translateY(3px); box-shadow:0 1px 0 #b9860f;}
  @keyframes skipIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  #tv{width:100%; height:274px; flex:none; display:block; background:#000;}

  /* ------- Result ------- */
  #screen-result .panel{background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:20px 26px; width:min(620px,94%); text-align:center; max-height:92%; overflow:auto; position:relative;}
  .winner{font-size:25px; font-weight:900; color:var(--gold); margin:4px 0 12px;}
  .payline{display:flex; justify-content:space-between; gap:10px; padding:7px 4px; border-bottom:1px dashed var(--line); font-size:14px; align-items:center; text-align:left;}
  .payline.lose{animation:shakeX .5s .3s;}
  @keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
  .pos{color:#9fe6b3;} .neg{color:var(--red);}
  .finishlist{margin:8px 0; font-size:14px; text-align:left;}
  .finishlist .fr{display:flex; gap:8px; padding:3px 0; align-items:center;}
  .lcoat{width:13px; height:13px; border-radius:3px; flex:none;}
  .broke{color:var(--red); font-weight:800; margin-top:8px;}
  .credits{position:absolute; bottom:8px; width:100%; text-align:center; font-size:11px; opacity:.45;}
  /* 인라인 코인 아이콘 (<span class="cn"></span> 이모지 대체 — 윈도우 등 모든 환경에서 항상 렌더) */
  .cn{display:inline-block; width:.85em; height:.85em; border-radius:50%; vertical-align:-.08em; margin:0 .05em;
    background:radial-gradient(circle at 35% 30%, #ffe98a, #f4c430 55%, #b9860f);
    box-shadow:inset 0 0 0 1px rgba(120,80,10,.55);}
  .coin{position:absolute; top:-10px; width:16px; height:16px; border-radius:50%; pointer-events:none; z-index:5;
    background:radial-gradient(circle at 35% 30%, #ffe98a, #f4c430 55%, #b9860f);
    box-shadow:inset 0 0 0 1.5px rgba(185,134,15,.8);
    animation:coinfall 1.4s cubic-bezier(.3,.1,.7,1) forwards;}
  @keyframes coinfall{
    0%{transform:translate(0,-20px) rotateY(0) scale(1); opacity:1}
    80%{opacity:1}
    100%{transform:translate(var(--dx),420px) rotateY(1080deg) scale(.8); opacity:0}}

  /* 언어 토글 */
  #langToggle{position:absolute; top:12px; right:14px; z-index:20; display:flex; gap:6px;}
  .langbtn{cursor:pointer; border:none; border-radius:20px; padding:6px 14px; font-weight:800; font-size:13px;
    background:rgba(8,20,12,.7); color:#cde6d6; box-shadow:inset 0 0 0 1.5px rgba(205,230,214,.35);}
  .langbtn.on{background:var(--gold); color:#0a2c19; box-shadow:none;}

  /* 결과 포디엄 */
  .podium{display:flex; justify-content:center; align-items:flex-end; gap:10px; margin:14px 0 6px; height:210px;}
  .pod{display:flex; flex-direction:column; align-items:center; justify-content:flex-end;}
  .pod .podHorse{width:100px; height:66px;}
  .pod .podName{font-weight:800; font-size:13px; margin-top:2px; white-space:nowrap; max-width:110px; overflow:hidden; text-overflow:ellipsis;}
  .pod .podJockey{font-size:10px; opacity:.7;}
  .pod .podBlock{width:96px; border-radius:6px 6px 0 0; margin-top:6px; display:flex; align-items:flex-start;
    justify-content:center; font-size:30px; font-weight:900; color:#0a2c19; padding-top:6px;
    box-shadow:inset 0 3px 0 rgba(255,255,255,.3), 0 4px 10px rgba(0,0,0,.4);}
  .pod.r1 .podBlock{height:120px; background:linear-gradient(180deg,#ffe27a,var(--gold));}
  .pod.r2 .podBlock{height:88px;  background:linear-gradient(180deg,#eaeaea,#b8b8b8);}
  .pod.r3 .podBlock{height:62px;  background:linear-gradient(180deg,#e6a866,#cd7f32);}
  .pod.r1{order:2;} .pod.r2{order:1;} .pod.r3{order:3;}
  @keyframes podRise{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .podium .pod{animation:podRise .5s backwards;}
  .podium .pod.r2{animation-delay:.1s;} .podium .pod.r1{animation-delay:.25s;} .podium .pod.r3{animation-delay:.4s;}

  /* 착순 보드(말 미니 초상 포함) */
  .fr .frHorse{width:52px; height:30px; flex:none;}
  .fr .frRk{width:34px; font-weight:800; text-align:center; flex:none;}

  /* 명예의 전당 */
  .lb{margin:10px 0; text-align:left; font-size:13px;}
  .lb .lbrow{display:flex; gap:8px; padding:4px 6px; border-radius:6px; align-items:center;}
  .lb .lbrow:nth-child(odd){background:rgba(255,255,255,.04);}
  .lb .lbrow.me{background:rgba(244,196,48,.16); box-shadow:inset 0 0 0 1px rgba(244,196,48,.5);}
  .lb .lbrk{width:26px; font-weight:800; color:var(--gold); text-align:center;}
  .lb .lbnick{flex:1; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .lb .lbamt{font-weight:800; color:#9fe6b3;}
  .lb .lbmeta{font-size:11px; opacity:.6;}
  .saverow{display:flex; gap:8px; justify-content:center; margin:10px 0; flex-wrap:wrap;}
  .saverow input{border-radius:8px; border:1px solid var(--line); background:#0a2c19; color:#f4f7e8;
    padding:9px 12px; font-size:15px; font-weight:700; width:180px; text-align:center;}

  /* 배당판 팝업 */
  #oddsModal{position:absolute; inset:0; z-index:50; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.55); padding:16px;}
  #oddsModal.show{display:flex;}
  .oddsPanel{background:#08210f; border:2px solid var(--gold); border-radius:14px; width:min(680px,96%);
    max-height:90%; overflow:auto; padding:14px 16px; box-shadow:0 20px 50px rgba(0,0,0,.6);}
  .oddsPanel h3{margin:0 0 10px; color:var(--gold); font-size:18px; display:flex; justify-content:space-between; align-items:center;}
  .oddsTbl{width:100%; border-collapse:collapse; font-size:13px;}
  .oddsTbl th,.oddsTbl td{padding:6px 8px; border-bottom:1px solid var(--line); text-align:center;}
  .oddsTbl th{color:#9fd7b0; font-size:11px; letter-spacing:1px;}
  .oddsTbl td.nmc{text-align:left; font-weight:700;}
  .oddsTbl .owin{color:var(--gold); font-weight:800;}
  .oddsClose{cursor:pointer; border:none; background:var(--gold); color:#0a2c19; font-weight:800; border-radius:8px; padding:6px 14px;}

  /* ============ 모바일 최적화 (세로 화면) ============ */
  @media (max-width: 760px), (pointer: coarse) and (max-width: 900px) {
    #app{width:100vw; height:100vh; height:100dvh; border-radius:0; box-shadow:none;}
    h1{font-size:34px;}
    .btn{padding:16px 22px; font-size:18px;}          /* 터치 타겟 크게 */
    .chip{padding:10px 12px; font-size:14px;}
    .card-list{grid-template-columns:1fr; gap:8px;}
    .hc-canvas{width:104px; height:66px;}
    .hc-name{font-size:17px;} .hc-jockey{font-size:12px;} .hc-form{font-size:11px;}
    .topbar h2{font-size:17px;} .wallet{padding:5px 9px; font-size:13px;}
    .betbar{max-height:46%;}
    .betrow{gap:6px; min-height:34px;}
    #tv{height:32vh; height:32dvh;}
    #raceHud{height:auto; min-height:44px; flex-wrap:wrap; padding:5px 8px; gap:5px;}
    #rankStrip{order:3; flex-basis:100%; height:30px;}
    #hudInfo{font-size:13px;}
    #leader{display:none;}
    .podium{height:170px; gap:6px;}
    .pod .podHorse{width:78px; height:52px;}
    .pod .podBlock{width:74px;}
    .pod.r1 .podBlock{height:96px;} .pod.r2 .podBlock{height:70px;} .pod.r3 .podBlock{height:50px;}
    #screen-result .panel{padding:16px 14px; width:96%;}
    .payline{font-size:13px;}
    #langToggle{top:8px; right:8px;}
    .saverow input{width:150px;}
  }
  @media (max-width: 900px) and (orientation: landscape){
    #tv{height:38vh; height:38dvh;}

function t(k){ return (I18N[state.lang]||I18N.ko)[k] ?? k; }

}

function betDesc(id){ return state.lang==='en'? BET_TYPES[id].ed : BET_TYPES[id].d; }

/* "N번" / "#N" 언어별 마번 표기 */

const START_MONEY = 1000;
const PXD = 0.85;      /* TV: 트랙거리 → 화면픽셀 배율 */

function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

function startGame(players){

}
/* ---- 명예의 전당 (localStorage) ---- */
function getScores(){ try{ return JSON.parse(localStorage.getItem('turf_scores')||'[]'); }catch(e){ return []; } }
function setScores(a){ try{ localStorage.setItem('turf_scores',JSON.stringify(a.slice(0,10))); }catch(e){} }
function saveScore(){
  const inp=document.getElementById('nickInput'); if(!inp) return;
  const nick=(inp.value||'').trim().slice(0,14) || (state.lang==='en'?'Player':'플레이어');
  const sc=getScores();
  sc.push({nick, peak:state.peak, races:state.round, ts:Date.now()});
  sc.sort((a,b)=>b.peak-a.peak);
  setScores(sc);
  state.scoreSaved=true; state.myNick=nick;
  renderLeaderboard();
}
function renderLeaderboard(){
  const box=document.getElementById('lbBox'); if(!box) return;
  const sc=getScores();
  const saveArea=document.getElementById('saveArea');
  if(saveArea) saveArea.style.display=state.scoreSaved?'none':'flex';
  if(!sc.length){ box.innerHTML=`<div style="opacity:.6;text-align:center;padding:8px">${t('empty')}</div>`; return; }
  box.innerHTML=sc.map((s,i)=>{
    const me=(state.scoreSaved && s.nick===state.myNick && Math.abs(s.ts-Date.now())<60000);
    const medal=['🥇','🥈','🥉'][i]||(i+1);
    return `<div class="lbrow ${me?'me':''}">
      <span class="lbrk">${medal}</span>
      <span class="lbnick">${s.nick}</span>
      <span class="lbmeta">${s.races} ${t('races')}</span>
      <span class="lbamt">${s.peak.toLocaleString()}<span class="cn"></span></span></div>`;
  }).join('');
}
function setLang(l){
  state.lang=l;

}
function applyStartTexts(){

  const set=(id,txt)=>{ const e=document.getElementById(id); if(e) e.textContent=txt; };

function pick(arr,k){ const c=[...arr]; const out=[]; for(let i=0;i<k;i++) out.push(c.splice(Math.floor(Math.random()*c.length),1)[0]); return out; }
function shade(hex,amt){ const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,Math.min(255,(n>>16)+amt)), g=Math.max(0,Math.min(255,((n>>8)&255)+amt)), b=Math.max(0,Math.min(255,(n&255)+amt));
  return `rgb(${r},${g},${b})`; }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function ordinal(n){ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

/* ============================ 시작화면 히어로 이미지 (정적) ============================ */
/* 실제 경마 사진(퍼블릭 도메인, Wikimedia Commons) — 로드 실패 시 일러스트로 폴백 */
let heroPhoto=null, heroPhotoFailed=false;
const HERO_PHOTO_URL='hero.jpg';   /* 다운로드 폴더의 최신 고화질 레이스 액션 샷 */
function loadHeroPhoto(){
  if(heroPhoto||heroPhotoFailed) return;
  const img=new Image();
  img.onload=()=>{ heroPhoto=img; if(document.getElementById('screen-start').classList.contains('active')) drawHeroArt(); };
  img.onerror=()=>{ heroPhotoFailed=true; drawHeroArt(); };
  img.src=HERO_PHOTO_URL;
}
function drawHeroArt(){
  /* 메인 배경은 순수 사진(<img id="heroArt">)으로 표시한다. 캔버스 일러스트는 사용 안 함. */
  return;
  /* eslint-disable no-unreachable */
  const cv=document.getElementById('heroArt'); if(!cv) return;
  const w=cv.clientWidth, h=cv.clientHeight; if(!w||!h) return;
  const dpr=window.devicePixelRatio||1;
  cv.width=w*dpr; cv.height=h*dpr;
  const g=cv.getContext('2d'); g.setTransform(dpr,0,0,dpr,0,0);

  /* 사진이 준비됐으면 커버 맞춤으로 그리고 종료 */
  if(heroPhoto){
    const iw=heroPhoto.naturalWidth, ih=heroPhoto.naturalHeight;
    const s=Math.max(w/iw,h/ih), dw=iw*s, dh=ih*s;
    g.drawImage(heroPhoto,(w-dw)/2,(h-dh)/2,dw,dh);
    /* 하단 그라데이션(제목 가독성) + 살짝 따뜻한 톤 */
    const grd=g.createLinearGradient(0,h*0.45,0,h);
    grd.addColorStop(0,'rgba(6,16,10,0)'); grd.addColorStop(1,'rgba(6,16,10,.62)');
    g.fillStyle=grd; g.fillRect(0,0,w,h);
    return;
  }
  /* 사진 로딩 중에는 일러스트를 그리지 않고 단색 배경만 → 그림→사진 깜빡임 방지.
     일러스트는 사진 로드에 '실패'했을 때만 폴백으로 사용한다. */
  if(!heroPhotoFailed){
    loadHeroPhoto();
    const bg=g.createLinearGradient(0,0,0,h);
    bg.addColorStop(0,'#0d3a20'); bg.addColorStop(1,'#0a2c19');
    g.fillStyle=bg; g.fillRect(0,0,w,h);
    return;
  }

  const horizon=h*0.50;
  /* 노을 하늘 */
  const sky=g.createLinearGradient(0,0,0,horizon);
  sky.addColorStop(0,'#243a63'); sky.addColorStop(0.4,'#c86f4b'); sky.addColorStop(0.72,'#f2b063'); sky.addColorStop(1,'#ffe1a6');
  g.fillStyle=sky; g.fillRect(0,0,w,horizon+2);
  const sun=g.createRadialGradient(w*0.72,horizon*0.60,6,w*0.72,horizon*0.60,150);
  sun.addColorStop(0,'rgba(255,248,224,.98)'); sun.addColorStop(0.5,'rgba(255,226,170,.5)'); sun.addColorStop(1,'rgba(255,226,170,0)');
  g.fillStyle=sun; g.beginPath(); g.arc(w*0.72,horizon*0.60,150,0,7); g.fill();
  g.fillStyle='#fff8e6'; g.beginPath(); g.arc(w*0.72,horizon*0.60,30,0,7); g.fill();
  g.fillStyle='rgba(255,236,205,.22)';
  for(let i=0;i<5;i++){ g.beginPath(); g.ellipse(w*(0.08+i*0.23),horizon*(0.24+((i*13)%9)/40),70+i*12,9,0,0,7); g.fill(); }
  /* 새떼 */
  g.strokeStyle='rgba(40,30,25,.5)'; g.lineWidth=1.5;
  for(let i=0;i<6;i++){ const bx=w*0.30+i*16+(i%2)*6, by=horizon*0.3+((i*7)%16);
    g.beginPath(); g.moveTo(bx,by); g.lineTo(bx+4,by-3); g.lineTo(bx+8,by); g.stroke(); }

  /* 그랜드스탠드 (지붕 + 관중 실루엣) */
  const standY=horizon-h*0.17, standH=h*0.17;
  g.fillStyle='#20130f'; g.fillRect(0,standY+standH*0.30,w,standH*0.72);           /* 스탠드 몸체 */
  g.fillStyle='#301c15';
  g.beginPath(); g.moveTo(0,standY+standH*0.34); g.lineTo(w*0.5,standY); g.lineTo(w,standY+standH*0.34);
  g.lineTo(w,standY+standH*0.44); g.lineTo(0,standY+standH*0.44); g.closePath(); g.fill(); /* 지붕 */
  /* 관중 실루엣(정적) */
  for(let i=0;i<180;i++){
    const rx=hashRnd(i)*w, ry=standY+standH*0.46+hashRnd(i+5)*standH*0.5;
    g.fillStyle=`hsla(${hashRnd(i+9)*360|0},35%,${28+hashRnd(i+2)*22|0}%,.9)`;
    g.beginPath(); g.ellipse(rx,ry+1.4,1.7,2.2,0,0,7); g.fill();
    g.fillStyle='rgba(20,14,10,.75)'; g.beginPath(); g.arc(rx,ry-1.4,1.3,0,7); g.fill();
  }
  /* 깃발 */
  g.strokeStyle='#20130f'; g.lineWidth=2.4;
  [0.05,0.5,0.95].forEach((fx,k)=>{ const px=w*fx;
    g.beginPath(); g.moveTo(px,standY+standH*0.02); g.lineTo(px,standY-standH*0.5); g.stroke();
    g.fillStyle=['#c0392b','#f4c430','#2f7ed8'][k];
    g.beginPath(); g.moveTo(px,standY-standH*0.5); g.lineTo(px+20,standY-standH*0.4); g.lineTo(px,standY-standH*0.3); g.closePath(); g.fill(); });

  /* 잔디 인필드 + 흙 트랙 */
  const grass=g.createLinearGradient(0,horizon,0,h);
  grass.addColorStop(0,'#3f7d3b'); grass.addColorStop(1,'#2b5527');
  g.fillStyle=grass; g.fillRect(0,horizon,w,h-horizon);
  const dirt=g.createLinearGradient(0,horizon+h*0.02,0,h);
  dirt.addColorStop(0,'#b78a54'); dirt.addColorStop(1,'#8a6034');
  g.fillStyle=dirt;
  g.beginPath(); g.moveTo(0,h); g.lineTo(w,h); g.lineTo(w*0.66,horizon+h*0.04); g.lineTo(w*0.34,horizon+h*0.04); g.closePath(); g.fill();
  /* 흰 레일 */
  g.strokeStyle='rgba(255,255,255,.85)'; g.lineWidth=2.4;
  g.beginPath(); g.moveTo(w*0.02,h-3); g.lineTo(w*0.345,horizon+h*0.04); g.stroke();
  g.beginPath(); g.moveTo(w*0.98,h-3); g.lineTo(w*0.655,horizon+h*0.04); g.stroke();

  /* 선두 경주마 무리 (정지 포즈, 컬러 실크) */
  const HC=['#6f3f22','#2b211b','#8f6136','#9d9890'];
  const SC=['#d63a2e','#2f6fd8','#f4c430','#27a85c'];
  const pack=[
    {lane:5,coat:HC[1],color:SC[0],pattern:'blaze',cyc:0.30, x:0.40,y:0.60,sc:0.9},
    {lane:2,coat:HC[0],color:SC[1],pattern:'solid',cyc:0.52, x:0.52,y:0.68,sc:1.05},
    {lane:8,coat:HC[2],color:SC[2],pattern:'socks',cyc:0.14, x:0.63,y:0.78,sc:1.22},
  ];
  pack.forEach(p=>{
    const x=w*p.x, y=horizon+ (h-horizon)*p.y*0.9, sc=p.sc*(h/300);
    g.save(); g.translate(x,y);
    g.globalAlpha=.3; g.fillStyle='#20140a';
    g.beginPath(); g.ellipse(2,15*sc,26*sc,5*sc,0,0,7); g.fill(); g.globalAlpha=1;
    drawHorseSprite(g,{lane:p.lane,coat:p.coat,color:p.color,pattern:p.pattern,style:'front',whip:false},sc,p.cyc,{running:true,t:0});
    g.restore();
  });

  /* 따뜻한 컬러 그레이드 + 비네트 */
  g.fillStyle='rgba(255,180,90,.07)'; g.fillRect(0,0,w,h);
  const vg=g.createRadialGradient(w/2,h*0.52,h*0.42,w/2,h*0.52,h*1.05);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.42)');
  g.fillStyle=vg; g.fillRect(0,0,w,h);
}

}
function startHeroLoop(){ drawHeroWhenReady(); }   /* 이름 유지 (호출부 호환) */
window.addEventListener('resize',()=>{ if(document.getElementById('screen-start').classList.contains('active')) drawHeroArt(); });
window.addEventListener('load',drawHeroWhenReady);

function buildHorses(){
  const names=pick(HORSE_NAMES,N), jocks=pick(JOCKEYS,N), silks=pick(SILK_COLORS,N), coats=pick(COATS,N);
  const strengths=names.map(()=> 0.96+Math.random()*0.13);
  const raw=strengths.map(s=>Math.pow(s,26));
  const sum=raw.reduce((a,b)=>a+b,0);
  return names.map((nm,i)=>{
    const prob=raw[i]/sum;
    const pat=PATTERNS[Math.floor(Math.random()*PATTERNS.length)];
    const sty=STYLES[Math.floor(Math.random()*STYLES.length)];
    const form=FORMS[Math.floor(Math.random()*FORMS.length)];
    return {
      lane:i+1, _name:nm, _jockey:jocks[i], color:silks[i],
      coat:coats[i].c, _coat:coats[i], pattern:pat.id, _pat:pat,
      style:sty.id, _sty:sty, _form:form,
      get name(){ return loc(this._name); },
      get jockey(){ return loc(this._jockey); },
      get coatName(){ return loc(this._coat); },
      get patternName(){ return loc(this._pat); },
      get styleName(){ return loc(this._sty); },
      get form(){ return loc(this._form); },
      strength:strengths[i], prob,
      /* 단승 환급률 80% (실제 경마 수준) + 실시간 변동 */
      baseOdds:Math.min(99,Math.max(1.3,Math.round((1/prob)*0.80*10)/10)),
      odds:Math.min(99,Math.max(1.3,Math.round((1/prob)*0.80*10)/10)),
      drift:1, todayM:1,
      dist:0, spd:0, off:i+0.5, rank:i+1, finished:false, finishOrder:0, whip:false,
    };
  });
}
function nextRace(){
  state.round++;
  /* 첫 경주는 마일(2.5바퀴), 이후 매번 랜덤 종류 */
  state.raceType = state.round===1? RACE_TYPES[1] : RACE_TYPES[Math.floor(Math.random()*RACE_TYPES.length)];
  state.laps=state.raceType.laps; state.raceMeters=state.raceType.m;
  state.horses=buildHorses();
  state.bets=[null,null];
  renderBet();
  show('screen-bet');
}

/* ============================ 사실적 말 스프라이트 ============================ */
/* 갤럽 보법 키프레임: [위상, 상부각(전방+), 하부접힘각] */
const F_KEY=[[0,.95,-.10],[.12,.60,-.05],[.28,.05,.02],[.42,-.60,.15],[.55,-.75,.90],[.70,-.10,1.55],[.85,.65,.70],[1,.95,-.10]];
const H_KEY=[[0,-.35,.25],[.15,-.85,.55],[.35,-.40,1.15],[.55,.55,.95],[.72,.80,.35],[.85,.55,.15],[1,-.35,.25]];
function gait(keys,t){
  t=((t%1)+1)%1;
  for(let i=0;i<keys.length-1;i++){
    const a=keys[i],b=keys[i+1];
    if(t>=a[0]&&t<=b[0]){ const k=(t-a[0])/((b[0]-a[0])||1);
      return [a[1]+(b[1]-a[1])*k, a[2]+(b[2]-a[2])*k]; }
  }
  return [keys[0][1],keys[0][2]];
}
function drawLegSeg(g,ax,ay,phT,front,color,w,sock){
  const [a1,a2]=gait(front?F_KEY:H_KEY,phT);
  const L1=front?11.5:12.5, L2=front?11.5:12, L3=3.4;
  const kx=ax+Math.sin(a1)*L1, ky=ay+Math.cos(a1)*L1;
  const la=a1-a2;
  const fx=kx+Math.sin(la)*L2, fy=ky+Math.cos(la)*L2;
  const pa=la*0.55;
  const hx=fx+Math.sin(pa)*L3, hy=fy+Math.cos(pa)*L3;
  const hi=shade(color,26), sh=shade(color,-24);
  g.lineCap='round';
  /* 상완/대퇴 (굵게, 음영 겹쳐 원통감) */
  g.strokeStyle=sh;    g.lineWidth=w*1.7;   g.beginPath(); g.moveTo(ax,ay-2.5); g.lineTo(kx,ky); g.stroke();
  g.strokeStyle=color; g.lineWidth=w*1.25;  g.beginPath(); g.moveTo(ax-w*0.25,ay-2.5); g.lineTo(kx-w*0.2,ky); g.stroke();
  /* 관절(무릎/비절) */
  g.fillStyle=sh; g.beginPath(); g.ellipse(kx,ky,w*0.62,w*0.5,la*0.3,0,7); g.fill();
  /* 관부(cannon) */
  g.strokeStyle=color; g.lineWidth=w;      g.beginPath(); g.moveTo(kx,ky); g.lineTo(fx,fy); g.stroke();
  g.strokeStyle=hi;     g.lineWidth=w*0.4;  g.beginPath(); g.moveTo(kx-w*0.18,ky); g.lineTo(fx-w*0.15,fy); g.stroke();
  if(sock){ g.strokeStyle='#d8d2c4'; g.lineWidth=w*0.95;
    g.beginPath(); g.moveTo((kx+fx*2)/3,(ky+fy*2)/3); g.lineTo(fx,fy); g.stroke(); }
  /* 구절(pastern) */
  g.strokeStyle=shade(color,-10); g.lineWidth=w*0.82;
  g.beginPath(); g.moveTo(fx,fy); g.lineTo(hx,hy); g.stroke();
  /* 발굽: 쐐기형 + 밝은 테두리(각질) */
  g.save(); g.translate(hx,hy+1); g.rotate(pa*0.4+ (front?0.15:-0.15));
  g.fillStyle='#100b07';
  g.beginPath(); g.moveTo(-2.1,-1.6); g.lineTo(2.1,-1.6); g.lineTo(1.5,2.2); g.quadraticCurveTo(0,3.2,-1.5,2.2); g.closePath(); g.fill();
  g.strokeStyle='rgba(210,190,160,.55)'; g.lineWidth=0.5;
  g.beginPath(); g.moveTo(-2.1,-1.5); g.lineTo(2.1,-1.5); g.stroke();
  g.restore();
}

/* 오른쪽을 향한 말+기수. s 스케일, cyc 보폭 사이클(0~1 반복), opts:{running,whip,t} */
function drawHorseSprite(g,h,s,cyc,opts={}){
  const running=opts.running!==false;
  const t=opts.t||0;
  const coat=h.coat, dark=shade(h.coat,-34), darker=shade(h.coat,-58), lite=shade(h.coat,26);
  const sock=h.pattern==='socks';
  if(!running) cyc=0.24;
  g.save(); g.scale(s,s);
  const w2=Math.PI*2;
  const bob=running? Math.sin(cyc*w2+0.6)*2.1 : 0;
  const pitch=running? Math.sin(cyc*w2+1.3)*0.055 : 0;
  g.translate(0,bob); g.rotate(pitch);

  /* 먼쪽 다리 */
  drawLegSeg(g, 12.5,4.5, running?cyc+0.13:0.12, true,  darker, 3.1, false);
  drawLegSeg(g,-16.5,3.5, running?cyc+0.65:0.9,  false, darker, 3.5, false);

  /* 꼬리 (세 가닥) */
  g.lineCap='round';
  for(let i=0;i<3;i++){
    g.strokeStyle=shade(h.coat,-58+i*8); g.lineWidth=2.6-i*0.5;
    const fl=running? Math.sin(cyc*w2*0.5+i)*2.5 : 1;
    g.beginPath(); g.moveTo(-29,-5+i*1.2);
    g.quadraticCurveTo(-37,-4+fl, -40+i*1.5, 6+fl*1.4+i*2);
    g.stroke();
  }

  /* 몸통 — 해부학적 실루엣 + 명암 그라데이션 */
  const grad=g.createLinearGradient(0,-16,0,14);
  grad.addColorStop(0,lite); grad.addColorStop(0.42,coat); grad.addColorStop(1,dark);
  g.fillStyle=grad;
  g.beginPath();
  g.moveTo(-30,-2);
  g.quadraticCurveTo(-33,-10,-22,-12.5);      /* 엉덩이(둔부) */
  g.quadraticCurveTo(-8,-14.5,4,-13.5);       /* 등 */
  g.quadraticCurveTo(9,-15,15,-12);           /* 기갑 */
  g.quadraticCurveTo(21,-7,22,-1);            /* 어깨 앞 */
  g.quadraticCurveTo(23,6,18,10);             /* 가슴 깊이 */
  g.quadraticCurveTo(4,13.5,-8,11);           /* 배 */
  g.quadraticCurveTo(-24,9,-30,-2);           /* 뒷다리 상부 */
  g.closePath(); g.fill();
  /* 근육 음영 */
  g.strokeStyle='rgba(0,0,0,.16)'; g.lineWidth=1.4;
  g.beginPath(); g.moveTo(14,-6); g.quadraticCurveTo(11,2,14,8); g.stroke();      /* 어깨 */
  g.beginPath(); g.moveTo(-18,-9); g.quadraticCurveTo(-12,-2,-16,7); g.stroke();  /* 뒷다리 */
  g.strokeStyle='rgba(255,255,255,.10)'; g.lineWidth=2;
  g.beginPath(); g.moveTo(-22,-10); g.quadraticCurveTo(-14,-11,-6,-11.5); g.stroke();
  if(h.pattern==='dapple'){ g.fillStyle='rgba(255,255,255,.22)';
    for(let i=0;i<11;i++){ const a=i*2.399;
      g.beginPath(); g.arc(-13+Math.cos(a)*9,-2+Math.sin(a)*6,1.5,0,7); g.fill(); } }
  /* 광택 하이라이트: 등~어깨를 따라 흐르는 부드러운 반사광 */
  g.save();
  g.beginPath();
  g.moveTo(-30,-2); g.quadraticCurveTo(-33,-10,-22,-12.5); g.quadraticCurveTo(-8,-14.5,4,-13.5);
  g.quadraticCurveTo(9,-15,15,-12); g.quadraticCurveTo(21,-7,22,-1);
  g.quadraticCurveTo(23,6,18,10); g.quadraticCurveTo(4,13.5,-8,11); g.quadraticCurveTo(-24,9,-30,-2); g.closePath();
  g.clip();
  const sheen=g.createLinearGradient(0,-14,10,4);
  sheen.addColorStop(0,'rgba(255,255,255,.28)'); sheen.addColorStop(0.28,'rgba(255,255,255,0)');
  g.fillStyle=sheen; g.fillRect(-32,-16,64,30);
  /* 배 아래쪽 접지 그림자 */
  const belly=g.createLinearGradient(0,4,0,12);
  belly.addColorStop(0,'rgba(0,0,0,0)'); belly.addColorStop(1,'rgba(0,0,0,.22)');
  g.fillStyle=belly; g.fillRect(-32,4,64,10);
  g.restore();

  /* 목 — 신전 사이클 */
  const ext=running? Math.sin(cyc*w2)*0.5 : 0;   /* -0.5~0.5 */
  const hbx=29+ext*2.6, hby=-20+ext*3.4;
  g.fillStyle=grad;
  g.beginPath();
  g.moveTo(8,-13);
  g.quadraticCurveTo(18,-16,hbx-3,hby-4);
  g.lineTo(hbx+2.5,hby+2);
  g.quadraticCurveTo(21,-4,15,1);
  g.closePath(); g.fill();
  /* 갈기 — 흩날림 */
  for(let i=0;i<4;i++){
    g.strokeStyle=darker; g.lineWidth=1.6;
    const mfl=running? Math.sin(t*10+i*1.7)*1.6 : 0;
    g.beginPath(); g.moveTo(11+i*4.2,-13.5-i*1.6);
    g.quadraticCurveTo(8+i*4,-17-i*1.6+mfl, 5.5+i*4,-15.5-i*1.8+mfl);
    g.stroke();
  }

  /* 머리 */
  g.save(); g.translate(hbx,hby); g.rotate(0.62-ext*0.14);
  const headGrad=g.createLinearGradient(-4,-6,12,6);          /* 머리 전용 국소 그라데이션 */
  headGrad.addColorStop(0,lite); headGrad.addColorStop(0.5,coat); headGrad.addColorStop(1,dark);
  g.fillStyle=headGrad;
  g.beginPath();                                   /* 두개골+콧대 */
  g.moveTo(-4,-4.5);
  g.quadraticCurveTo(3,-6,8,-3.2);
  g.lineTo(12.5,3.2);                              /* 콧대 직선 */
  g.quadraticCurveTo(13,6,10.5,6.4);               /* 주둥이 */
  g.quadraticCurveTo(5,6.5,1,4.5);
  g.quadraticCurveTo(-4.5,2,-4,-4.5);
  g.closePath(); g.fill();
  g.fillStyle=dark;                                 /* 귀 2개 */
  g.beginPath(); g.moveTo(-3.5,-4); g.lineTo(-1.8,-9.5); g.lineTo(0.4,-3.8); g.closePath(); g.fill();
  g.beginPath(); g.moveTo(-0.5,-4.4); g.lineTo(1.4,-8.8); g.lineTo(3.2,-3.6); g.closePath(); g.fill();
  if(h.pattern==='blaze'){ g.fillStyle='rgba(240,235,224,.92)';
    g.beginPath(); g.moveTo(2,-4); g.lineTo(4.6,-4.2); g.lineTo(12,4); g.lineTo(9.6,5.4); g.closePath(); g.fill(); }
  if(h.pattern==='star'){ g.fillStyle='rgba(240,235,224,.92)';
    g.beginPath(); g.arc(2,-2.2,1.6,0,7); g.fill(); }
  g.fillStyle='#0d0906'; g.beginPath(); g.ellipse(2.6,-1.4,1.25,1.05,0,0,7); g.fill(); /* 눈 */
  g.fillStyle='rgba(255,255,255,.45)'; g.beginPath(); g.arc(2.9,-1.8,0.4,0,7); g.fill();
  g.fillStyle=darker; g.beginPath(); g.ellipse(11,4.6,1.1,0.8,0.5,0,7); g.fill();     /* 콧구멍 */
  g.strokeStyle='#241812'; g.lineWidth=0.85;                                          /* 굴레 */
  g.beginPath(); g.moveTo(9.5,5.2); g.lineTo(4,1.2); g.stroke();
  g.beginPath(); g.moveTo(4,1.2); g.lineTo(0.5,-3.6); g.stroke();
  g.restore();

  /* 가까운쪽 다리 */
  drawLegSeg(g, 14,4.5,  running?cyc:0.28,       true,  dark, 4.0, sock);
  drawLegSeg(g,-14.5,3.5,running?cyc+0.52:0.02,  false, dark, 4.4, sock);

  /* 안장 + 번호천 */
  g.fillStyle='#2a1c10';
  g.beginPath(); g.ellipse(2,-9.5,7.5,3,0.08,0,7); g.fill();
  g.fillStyle=h.color;
  g.beginPath(); g.roundRect(-3.5,-10,12,11,2); g.fill();
  g.strokeStyle='rgba(0,0,0,.4)'; g.lineWidth=0.7; g.stroke();
  g.fillStyle='#fff'; g.font='bold 8px sans-serif'; g.textAlign='center'; g.textBaseline='middle';
  g.fillText(h.lane,2.5,-4.2);
  /* 뱃대끈 */
  g.strokeStyle='#20150c'; g.lineWidth=1.6;
  g.beginPath(); g.moveTo(1,1); g.lineTo(2,11.5); g.stroke();

  /* ---------- 기수 (몽키 자세) ---------- */
  const jbob=running? -bob*0.45 : 0;
  const pump=running? Math.sin(cyc*w2)*1.4 : 0;
  /* 채찍 상태 */
  let whipQ=-1;
  if(opts.whip){ whipQ=((t*1.45)+h.lane*0.37)%1; }
  g.save(); g.translate(1.5,-13.5+jbob);
  /* 다리: 등자에 선 자세 */
  g.strokeStyle='#e9e4d8'; g.lineWidth=3.0; g.lineCap='round';
  g.beginPath(); g.moveTo(-0.5,0.5); g.lineTo(4.5,4.5); g.lineTo(2,8.5); g.stroke();
  g.strokeStyle='#171310'; g.lineWidth=3.0;
  g.beginPath(); g.moveTo(2,8.5); g.lineTo(1.2,11.5); g.stroke();     /* 부츠 */
  g.strokeStyle='rgba(255,255,255,.28)'; g.lineWidth=0.8;             /* 부츠 광택 */
  g.beginPath(); g.moveTo(2.3,9); g.lineTo(1.7,11); g.stroke();
  g.strokeStyle='#5c5c60'; g.lineWidth=1;                             /* 등자쇠 */
  g.beginPath(); g.moveTo(1.2,11.5); g.lineTo(0.2,13); g.stroke();
  /* 상체: 등이 지면과 평행한 크라우치 */
  const jTorso=new Path2D();
  jTorso.moveTo(-2.5,-2);
  jTorso.quadraticCurveTo(-1,-8.5,5,-9.5);
  jTorso.lineTo(11,-8.6);
  jTorso.quadraticCurveTo(11.5,-4.5,8,-2.5);
  jTorso.quadraticCurveTo(2,-0.5,-2.5,-2);
  jTorso.closePath();
  g.fillStyle=h.color; g.fill(jTorso);
  g.save(); g.clip(jTorso);                          /* 실크 대각 스트라이프 */
  g.fillStyle=shade(h.color,-46);
  g.beginPath(); g.moveTo(2,-10); g.lineTo(6,-10); g.lineTo(1,0); g.lineTo(-3,0); g.closePath(); g.fill();
  g.fillStyle='rgba(255,255,255,.16)';
  g.fillRect(-4,-10,16,3.4);
  g.restore();
  g.strokeStyle='rgba(0,0,0,.25)'; g.lineWidth=0.8;
  g.beginPath(); g.moveTo(0,-5.5); g.quadraticCurveTo(5,-7,10,-6.5); g.stroke();
  /* 팔 */
  if(whipQ>=0 && whipQ<0.32){
    /* 채찍 치켜들기 */
    const raise=whipQ/0.32;
    g.strokeStyle=h.color; g.lineWidth=2.5;
    g.beginPath(); g.moveTo(8,-8); g.lineTo(10-raise*4,-13-raise*4); g.stroke();
    g.strokeStyle='#2c2013'; g.lineWidth=1.3;                          /* 채찍 */
    g.beginPath(); g.moveTo(10-raise*4,-13-raise*4);
    g.lineTo(4-raise*7,-16-raise*5); g.stroke();
  } else if(whipQ>=0.32 && whipQ<0.46){
    /* 스트라이크! */
    g.strokeStyle=h.color; g.lineWidth=2.5;
    g.beginPath(); g.moveTo(8,-8); g.lineTo(13,-1); g.stroke();
    g.strokeStyle='#2c2013'; g.lineWidth=1.3;
    g.beginPath(); g.moveTo(13,-1); g.quadraticCurveTo(16,4,14.5,8); g.stroke();
    g.strokeStyle='rgba(255,255,255,.5)'; g.lineWidth=1;               /* 임팩트 */
    g.beginPath(); g.moveTo(12,6); g.lineTo(16,9); g.moveTo(15,4); g.lineTo(18,6); g.stroke();
  } else {
    /* 고삐 쥔 손 — 목을 따라 펌핑 */
    g.strokeStyle=h.color; g.lineWidth=2.5;
    g.beginPath(); g.moveTo(8,-8); g.lineTo(13.5+pump,-5.5-pump*0.4); g.stroke();
    g.fillStyle='#e0bc96'; g.beginPath(); g.arc(14+pump,-5.5-pump*0.4,1.6,0,7); g.fill();
  }
  /* 머리+헬멧+고글 */
  g.fillStyle='#e0bc96'; g.beginPath(); g.arc(11.5,-11,2.7,0,7); g.fill();
  g.fillStyle=h.color; g.beginPath(); g.arc(11.3,-11.8,3.1,Math.PI*0.9,Math.PI*2.05); g.fill();
  g.fillStyle='rgba(30,30,40,.85)';
  g.beginPath(); g.roundRect(10.6,-11.8,4,1.7,0.8); g.fill();          /* 고글 */
  g.restore();

  /* 고삐: 재갈→기수 손 */
  g.strokeStyle='#33241a'; g.lineWidth=1;
  g.beginPath(); g.moveTo(hbx+7,hby+4);
  g.quadraticCurveTo(hbx-4,hby+6, 16+pump,-18.5+jbob); g.stroke();

  g.restore();
}

/* ============================ 트랙 지오메트리 ============================ */
let ctx, tvx, W, H, TVW, TVH;
const track={cx:0,cy:0,a:0,R:0,g:0,IMAX:0,perim:0};

function setupTrack(){
  const cv=document.getElementById('track');
  W=cv.clientWidth; H=cv.clientHeight;
  const dpr=window.devicePixelRatio||1;
  cv.width=W*dpr; cv.height=H*dpr;
  ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  track.cx=W/2; track.cy=H*0.52;
  track.a=W*0.315;
  track.R=Math.min(H*0.37, W*0.16);
  track.g=Math.min(15, track.R*0.115);
  track.IMAX=N*track.g;
  track.perim=4*track.a + 2*Math.PI*track.R;

  const tv=document.getElementById('tv');
  TVW=tv.clientWidth; TVH=tv.clientHeight;
  tv.width=TVW*dpr; tv.height=TVH*dpr;
  tvx=tv.getContext('2d'); tvx.setTransform(dpr,0,0,dpr,0,0);
}

/* off: 안쪽 레일에서 laneGap 단위 (0=레일) */
function pointAt(d,off){
  const inset=track.IMAX-off*track.g;
  const {cx,cy,a,R}=track;
  let dd=((d%track.perim)+track.perim)%track.perim;
  const straight=2*a, arc=Math.PI*R;
  if(dd<straight) return {x:cx-a+dd, y:cy-R+inset};
  dd-=straight;
  if(dd<arc){ const th=dd/R, rr=R-inset;
    return {x:cx+a+rr*Math.sin(th), y:cy-rr*Math.cos(th)}; }
  dd-=arc;
  if(dd<straight) return {x:cx+a-dd, y:cy+R-inset};
  dd-=straight;
  const th=dd/R, rr=R-inset;
  return {x:cx-a-rr*Math.sin(th), y:cy+rr*Math.cos(th)};
}
/* 곡선에서 안쪽일수록 중심선 거리 이득 */
/* 곡선에서 안쪽 레인이 dist를 빨리 진행시키면 화면상 말이 갑자기 튀어나가고
   카메라도 흔들린다 → 균일 진행(1)으로 고정해 부드러운 코너링을 보장한다.
   (인·아웃 코스 경쟁은 위치/블로킹으로만 반영, 거리 이득은 제거) */
function arcFactor(d,off){ return 1; }

/* ============================ 트랙 렌더 ============================ */
function stadiumPath(rr){
  rr=Math.max(1,rr);                 /* arc()는 음수 반지름에서 예외 */
  const {cx,cy,a}=track;
  ctx.beginPath();
  ctx.moveTo(cx-a,cy-rr); ctx.lineTo(cx+a,cy-rr);
  ctx.arc(cx+a,cy,rr,-Math.PI/2,Math.PI/2);
  ctx.lineTo(cx-a,cy+rr);
  ctx.arc(cx-a,cy,rr,Math.PI/2,Math.PI*1.5);
  ctx.closePath();
}

function drawTrackBase(){
  const {R,g,IMAX}=track;
  const edgeOut=R+g*0.6, edgeIn=R-IMAX-g*0.6;
  ctx.clearRect(0,0,W,H);
  /* 잔디 + 잔디깎기 줄무늬 */
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#417d3c'); bg.addColorStop(1,'#33652f');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  ctx.save();
  for(let i=0;i<10;i++){
    stadiumPath(edgeOut+14+i*16);
    ctx.strokeStyle=i%2?'rgba(255,255,255,.03)':'rgba(0,0,0,.04)';
    ctx.lineWidth=16; ctx.stroke();
  }
  ctx.restore();

  drawGrandstand();

  /* 흙 주로 */
  ctx.save();
  stadiumPath((edgeOut+edgeIn)/2);
  ctx.lineWidth=edgeOut-edgeIn; ctx.strokeStyle='#a97c47'; ctx.stroke();
  stadiumPath((edgeOut+edgeIn)/2);
  ctx.lineWidth=(edgeOut-edgeIn)*0.6; ctx.strokeStyle='rgba(140,98,52,.5)'; ctx.stroke();
  stadiumPath((edgeOut+edgeIn)/2+3);
  ctx.lineWidth=(edgeOut-edgeIn)*0.25; ctx.strokeStyle='rgba(184,138,80,.4)'; ctx.stroke();
  ctx.restore();

  /* 인필드 */
  ctx.save(); stadiumPath(edgeIn-1);
  const inf=ctx.createLinearGradient(0,track.cy-R,0,track.cy+R);
  inf.addColorStop(0,'#3f7a3a'); inf.addColorStop(1,'#356832');
  ctx.fillStyle=inf; ctx.fill();
  for(let i=0;i<5;i++){
    const rr=edgeIn-14-i*15;
    if(rr<10) break;                 /* 음수/과소 반지름 방지 (arc 예외) */
    stadiumPath(rr);
    ctx.strokeStyle=i%2?'rgba(255,255,255,.035)':'rgba(0,0,0,.045)';
    ctx.lineWidth=15; ctx.stroke();
  }
  ctx.restore();

  /* 레일 (그림자 포함) */
  ctx.save();
  stadiumPath(edgeOut+2); ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=4.5; ctx.stroke();
  stadiumPath(edgeOut+2); ctx.strokeStyle='#f2f0e8'; ctx.lineWidth=2.6; ctx.stroke();
  stadiumPath(edgeIn-2);  ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=4.5; ctx.stroke();
  stadiumPath(edgeIn-2);  ctx.strokeStyle='#f2f0e8'; ctx.lineWidth=2.6; ctx.stroke();
  ctx.restore();

  /* 펄롱 표시 폴 (안쪽 레일) */
  for(let i=1;i<8;i++){
    const p=pointAt(track.perim*i/8,-0.55);
    ctx.fillStyle=i%2?'#d8d8d0':'#c0392b';
    ctx.fillRect(p.x-1.5,p.y-8,3,8);
  }

  drawFinishLine(edgeIn,edgeOut);
  drawStartGate();
}

/* 메인 스탠드: 지붕 + 들썩이는 관중 + 종반 카메라 플래시 */
function drawGrandstand(){
  const {cx,cy,a,R,g}=track;
  const topEdge=cy-(R+g*0.6)-10;
  const y0=Math.max(4,topEdge-46), hgt=topEdge-y0;
  if(hgt<18) return;
  const x0=cx-a-R*0.72, x1=cx+a+R*0.72;
  ctx.fillStyle='#26343c';                          /* 지붕 */
  ctx.fillRect(x0,y0,x1-x0,hgt*0.28);
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.fillRect(x0,y0+hgt*0.28,x1-x0,3);
  const gd=ctx.createLinearGradient(0,y0,0,y0+hgt); /* 스탠드 몸체 */
  gd.addColorStop(0,'#55636d'); gd.addColorStop(1,'#3c4750');
  ctx.fillStyle=gd;
  ctx.fillRect(x0,y0+hgt*0.28,x1-x0,hgt*0.72);
  /* 관중: 사람 형태(머리+몸) + 흥분도에 따라 들썩이고 팔을 들어올림 */
  const excite=(state.finishedCount>0)?2.6:(state.stretchCalled?2.0:0.9);
  const n=Math.min(150,Math.floor((x1-x0)/7.2));
  for(let i=0;i<n;i++){
    const bx=x0+7+(i*7.6)%(x1-x0-14);
    const row=i%3;
    const by=y0+hgt*0.42+row*hgt*0.185;
    const jy=Math.abs(Math.sin(state.t*9+i*1.3))*excite;
    const hue=(hashRnd(i)*360)|0, lit=42+hashRnd(i+7)*24|0;
    const skin='hsl(30,45%,'+(55+hashRnd(i+3)*15|0)+'%)';
    const shirt=`hsl(${hue},50%,${lit}%)`;
    const raise=state.stretchCalled && Math.sin(state.t*5+i*1.7)>0.55;
    ctx.save(); ctx.translate(bx,by-jy);
    ctx.fillStyle=shirt; ctx.beginPath(); ctx.ellipse(0,2.2,1.9,2.6,0,0,7); ctx.fill();  /* 몸 */
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(0,-1.6,1.5,0,7); ctx.fill();            /* 머리 */
    if(raise){                                                                            /* 팔 번쩍 */
      ctx.strokeStyle=shirt; ctx.lineWidth=1; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-1.2,1); ctx.lineTo(-2.6,-3.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(1.2,1); ctx.lineTo(2.6,-3.4); ctx.stroke();
    }
    ctx.restore();
  }
  /* 종반 카메라 플래시 */
  if(state.stretchCalled){
    const fn=state.finishedCount>0?4:2;
    for(let i=0;i<fn;i++){
      if(Math.random()<0.35){
        const fx=x0+Math.random()*(x1-x0), fy=y0+hgt*0.36+Math.random()*hgt*0.55;
        ctx.fillStyle='rgba(255,255,255,.25)';
        ctx.beginPath(); ctx.arc(fx,fy,5+Math.random()*4,0,7); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.95)';
        ctx.beginPath(); ctx.arc(fx,fy,1.5+Math.random()*1.6,0,7); ctx.fill();
      }
    }
  }
}

/* 말이 지나간 자리의 발굽자국 (서서히 사라짐) */
function drawPrints(dt){
  for(let i=state.prints.length-1;i>=0;i--){
    const p=state.prints[i]; p.life-=dt*0.22;
    if(p.life<=0){ state.prints.splice(i,1); continue; }
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a);
    ctx.globalAlpha=Math.min(0.4,p.life*0.4);
    ctx.fillStyle='#5d4526';
    ctx.beginPath(); ctx.ellipse(-2,p.s*3,2.5,1.4,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(3,-p.s*3,2.5,1.4,0,0,7); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawFinishLine(edgeIn,edgeOut){
  const fd=(state.finishDist||2.5*track.perim)%track.perim;
  const rows=10;
  for(let i=0;i<rows;i++){
    const off1=-0.6+(N+1.2)*(i/rows), off2=-0.6+(N+1.2)*((i+1)/rows);
    const p1=pointAt(fd,off1), p2=pointAt(fd,off2);
    const q=pointAt(fd+3,(off1+off2)/2), c=pointAt(fd,(off1+off2)/2);
    const ang=Math.atan2(q.y-c.y,q.x-c.x);
    ctx.save(); ctx.translate((p1.x+p2.x)/2,(p1.y+p2.y)/2); ctx.rotate(ang);
    const cell=Math.hypot(p2.x-p1.x,p2.y-p1.y);
    ctx.fillStyle=i%2===0?'#f5f5f5':'#181818';
    ctx.fillRect(-3.5,-cell/2,7,cell);
    ctx.restore();
  }
}

function drawStartGate(){
  /* d=0 지점의 발주기 구조물 */
  const q=pointAt(3,N/2), c=pointAt(0,N/2);
  const ang=Math.atan2(q.y-c.y,q.x-c.x);
  ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(ang);
  const span=track.g*(N+1);
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.fillRect(-3,-span/2+2,8,span);
  ctx.fillStyle='#2e4a38';
  ctx.fillRect(-4,-span/2,7,span);
  ctx.fillStyle='#3f6a4e';
  for(let i=0;i<=N;i++){ ctx.fillRect(-7,-span/2+i*track.g,13,2.4); }
  ctx.restore();
}

function drawHorseOnTrack(h,running=true){
  const p=pointAt(h.dist,h.off), q=pointAt(h.dist+3,h.off);
  const ang=Math.atan2(q.y-p.y,q.x-p.x);
  const cyc=h.dist*0.014+h.lane*0.37;
  if(h.fallen){ drawFallenSprite(ctx,h,p,ang,0.42); return; }
  ctx.save(); ctx.translate(p.x,p.y);
  ctx.globalAlpha=.26; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(2,12,16,4.5,0,0,7); ctx.fill();
  ctx.globalAlpha=1;
  ctx.rotate(ang);
  if(Math.cos(ang)<0) ctx.scale(1,-1);
  drawHorseSprite(ctx,h,0.42,cyc,{running,whip:h.whip,t:state.t});
  ctx.restore();
  /* 번호 배지 */
  ctx.save(); ctx.translate(p.x,p.y-24);
  ctx.globalAlpha=.92;
  ctx.fillStyle=h.color; ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1.3;
  ctx.beginPath(); ctx.arc(0,0,8.5,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(h.lane,0,0.5);
  ctx.restore();
}

/* 완주 후 퇴장한 말들을 인필드 중앙에 착순대로 정렬 표시 */
/* 사진판독으로 확정된 1·2·3위(state.confirmed 명)를 트랙 중앙에 순차 표시 */
function drawParkedHorses(){
  const c=state.confirmed||0; if(c<=0 || !state.finalOrder) return;
  const top=state.finalOrder.slice(0,c);
  if(!top.length) return;
  const cx=track.cx, cy=track.cy;
  const cellW=Math.max(84, Math.min(150, track.a*0.55));
  const boxW=Math.min(track.a*1.85, top.length*cellW+24), boxH=110;
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='rgba(4,16,9,.62)';
  ctx.beginPath(); ctx.roundRect(cx-boxW/2,cy-boxH/2,boxW,boxH,10); ctx.fill();
  ctx.strokeStyle='rgba(244,196,48,.45)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#f4c430'; ctx.font='bold 11px sans-serif';
  ctx.fillText(state.lang==='en'?'PHOTO FINISH — TOP 3':'결승 · 1·2·3위',cx,cy-boxH/2+15);
  const gap=(boxW-24)/top.length;
  const startX=cx-(top.length-1)*gap/2;
  top.forEach((h,i)=>{
    const x=startX+i*gap, y=cy+26;
    /* 시상 단 */
    const blockH=[26,17,11][h.finishOrder-1]||10;
    ctx.fillStyle=['#f4c430','#c9c9c9','#cd7f32'][h.finishOrder-1];
    ctx.fillRect(x-22,y+6,44,blockH);
    ctx.save(); ctx.translate(x,y);
    ctx.globalAlpha=.28; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(1,6,15,3.5,0,0,7); ctx.fill(); ctx.globalAlpha=1;
    drawHorseSprite(ctx,h,0.36,0.24,{running:false});
    ctx.restore();
    /* 메달 배지 */
    ctx.fillStyle=['#f4c430','#c9c9c9','#cd7f32'][h.finishOrder-1];
    ctx.beginPath(); ctx.arc(x,y-30,9,0,7); ctx.fill();
    ctx.fillStyle='#0a2c19'; ctx.font='bold 11px sans-serif'; ctx.textBaseline='middle';
    ctx.fillText(['🥇','🥈','🥉'][h.finishOrder-1],x,y-29.5);
    /* 마번·이름 */
    ctx.textBaseline='alphabetic'; ctx.font='bold 10px sans-serif';
    ctx.fillStyle='#eafff0';
    let nm=h.name; const maxW=gap-10;
    if(ctx.measureText(nm).width>maxW){ while(nm.length>3 && ctx.measureText(nm+'…').width>maxW) nm=nm.slice(0,-1); nm+='…'; }
    ctx.fillText(`${h.lane}. ${nm}`,x,y+30);
  });
  ctx.restore();
}

/* 낙마한 말: 쓰러진 자세 + 튕겨나간 기수 + 흙먼지, s=스케일 */
/* 번쩍이는 경광등 (빨강↔파랑 교차, 발광) */
function drawBeacon(g,x,y,scale){
  scale=scale||1;
  const on=Math.sin(state.raceTime*11)>-0.1;                 /* 깜빡임 */
  const col=(Math.floor(state.raceTime*3.2)%2===0)?'#ff2f2f':'#2f6bff';  /* 색 교차 */
  g.save(); g.translate(x,y); g.scale(scale,scale);
  /* 지지대 + 받침 */
  g.strokeStyle='#2b2b2b'; g.lineWidth=2.4; g.lineCap='round';
  g.beginPath(); g.moveTo(0,13); g.lineTo(0,2); g.stroke();
  g.fillStyle='#3a3a3a'; g.beginPath(); g.ellipse(0,13,5,2,0,0,7); g.fill();
  /* 발광 후광 */
  if(on){
    const glow=g.createRadialGradient(0,-3,0,0,-3,14);
    glow.addColorStop(0,col); glow.addColorStop(1,'rgba(0,0,0,0)');
    g.globalAlpha=.75; g.fillStyle=glow; g.beginPath(); g.arc(0,-3,14,0,7); g.fill(); g.globalAlpha=1;
    /* 반짝 광선 */
    g.strokeStyle=col; g.lineWidth=1.4; g.globalAlpha=.9;
    for(let k=0;k<4;k++){ const a=state.raceTime*6+k*Math.PI/2;
      g.beginPath(); g.moveTo(Math.cos(a)*7,-3+Math.sin(a)*7); g.lineTo(Math.cos(a)*13,-3+Math.sin(a)*13); g.stroke(); }
    g.globalAlpha=1;
  }
  /* 램프 돔 */
  g.fillStyle=on?col:shade(col,-70);
  g.beginPath(); g.arc(0,-3,5,0,7); g.fill();
  g.strokeStyle='rgba(0,0,0,.45)'; g.lineWidth=1; g.stroke();
  g.fillStyle='rgba(255,255,255,.6)'; g.beginPath(); g.arc(-1.5,-4.5,1.4,0,7); g.fill();  /* 하이라이트 */
  g.restore();
}

function drawFallenSprite(g,h,p,ang,s){
  const since=state.raceTime-h.fallT;
  const tip=Math.min(1,since*2.2);   /* 0→1 넘어지는 정도 */
  const coat=h.coat, dark=shade(coat,-38), lite=shade(coat,26);
  g.save(); g.translate(p.x,p.y);
  /* 먼지 구름 */
  g.globalAlpha=Math.max(0,0.5-since*0.12); g.fillStyle='#b89a72';
  for(let i=0;i<7;i++){ const a=i*0.9; g.beginPath();
    g.arc(Math.cos(a)*(8+since*10),8+Math.sin(a)*5,5+since*4+i,0,7); g.fill(); }
  g.globalAlpha=1;
  /* ---- 쓰러진 말 (털색 유지, 발버둥) ---- */
  g.save();
  g.rotate(ang);
  if(Math.cos(ang)<0) g.scale(1,-1);
  g.rotate(tip*1.4);                 /* 옆으로 쓰러짐 */
  g.scale(s,s);
  /* 허우적대는 다리 (몸통 뒤) */
  g.strokeStyle=dark; g.lineWidth=4; g.lineCap='round';
  for(let i=0;i<4;i++){ const fx=-13+i*9, kick=Math.sin(state.raceTime*13+i*1.7)*7;
    g.beginPath(); g.moveTo(fx,3); g.lineTo(fx+kick*0.5,-15-Math.abs(kick)); g.stroke();
    g.fillStyle='#1a120b'; g.beginPath(); g.arc(fx+kick*0.5,-15-Math.abs(kick),2,0,7); g.fill(); }
  /* 몸통 (털색) */
  g.fillStyle=coat;
  g.beginPath(); g.ellipse(0,4,25,12,0,0,7); g.fill();
  g.globalAlpha=.25; g.fillStyle=lite;
  g.beginPath(); g.ellipse(-8,0,12,7,0,0,7); g.fill(); g.globalAlpha=1;
  /* 목/갈기 */
  g.fillStyle=coat; g.beginPath(); g.ellipse(19,0,8,5,0.5,0,7); g.fill();
  g.fillStyle=dark; g.beginPath(); g.ellipse(14,-3,6,3,0.6,0,7); g.fill();
  /* 머리 */
  g.fillStyle=coat; g.beginPath(); g.ellipse(25,4,9,5,0.35,0,7); g.fill();
  g.fillStyle=dark; g.beginPath(); g.moveTo(21,0); g.lineTo(20,-6); g.lineTo(24,0); g.closePath(); g.fill(); /* 귀 */
  g.fillStyle='#120c08'; g.beginPath(); g.arc(25,2,1.1,0,7); g.fill(); /* 눈 */
  g.restore();
  /* ---- 마번 배지 (실크색, 화면 정렬) ---- */
  g.save(); g.translate(0,-24);
  g.fillStyle=h.color; g.strokeStyle='#fff'; g.lineWidth=1.5;
  g.beginPath(); g.arc(0,0,9,0,7); g.fill(); g.stroke();
  g.fillStyle='#fff'; g.font='bold 11px sans-serif'; g.textAlign='center'; g.textBaseline='middle';
  g.fillText(h.lane,0,0.5);
  g.restore();
  /* ---- 번쩍이는 경광등 (기수 대신) ---- */
  drawBeacon(g, 26, -12, 1);
  g.restore();
}
