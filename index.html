function renderBet(){
  document.getElementById('raceTitle').textContent=
    `${t('raceR')}${state.round} · ${raceName()} ${state.raceMeters}m (${state.laps} ${t('laps')})`;
  renderWallets();
  const list=document.getElementById('cardList'); list.innerHTML='';
  state.horses.forEach(h=>{
    const c=document.createElement('div'); c.className='horse-card'; c.dataset.lane=h.lane;
    c.innerHTML=`
      <div class="lane-no" style="background:${h.color}">${h.lane}</div>
      <canvas class="hc-canvas" width="244" height="160"></canvas>
      <div class="hc-body">
        <div class="hc-name">${h.name}</div>
        <div class="hc-jockey">🧑 ${h.jockey} · ${h.coatName}${h.patternName? ' · '+h.patternName:''}</div>
        <div class="hc-form">${h.styleName} · ${h.form}</div>
      </div>
      <div class="odds">${h.odds.toFixed(1)}<small>${t('winOdds')}</small></div>
      <div class="pickflags"></div>`;
    c.onclick=()=>selectHorse(h.lane);
    list.appendChild(c);
  });
  startPaddock();
  renderBetbar(); refreshCards();
}

/* ---- 패독 생중계: 카드 속 말이 천천히 달리는 모습 + 실시간 토트보드 ---- */
let padItems=[], padRaf=null, padTote=0;
function startPaddock(){
  if(padRaf){ cancelAnimationFrame(padRaf); padRaf=null; }
  padTote=0;
  padItems=[...document.querySelectorAll('.horse-card')].map(c=>({
    g:c.querySelector('.hc-canvas').getContext('2d'),
    h:state.horses.find(x=>x.lane===+c.dataset.lane),
  }));
  padRaf=requestAnimationFrame(paddockFrame);
}
function paddockFrame(ts){
  if(!document.getElementById('screen-bet').classList.contains('active')){ padRaf=null; return; }
  const tm=ts/1000;
  /* 토트보드: 베팅이 몰리는 것처럼 배당률이 살아 움직임 */
  if(tm-padTote>2.2){
    padTote=tm;
    state.horses.forEach(h=>{
      h.drift=clamp(h.drift*(1+(Math.random()-0.5)*0.09),0.72,1.45);
      h.odds=Math.min(99,Math.max(1.2,Math.round(h.baseOdds*h.drift*10)/10));
    });
    document.querySelectorAll('.horse-card').forEach(c=>{
      const h=state.horses.find(x=>x.lane===+c.dataset.lane);
      const o=c.querySelector('.odds');
      const prev=parseFloat(o.dataset.v||h.odds);
      o.innerHTML=`${h.odds.toFixed(1)}<small>${t('winOdds')}</small>`;
      o.style.color=h.odds<prev?'#8fe9a0':h.odds>prev?'#ff9c9c':'var(--gold)';
      o.dataset.v=h.odds;
    });
    if(document.getElementById('oddsModal').classList.contains('show')) renderOddsBoard();
    /* 미확정 마권의 예상 배당도 갱신 */
    if([...Array(state.players).keys()].some(p=>!state.bets[p]||!state.bets[p].locked)) renderBetbar();
  }
  padItems.forEach(({g,h},idx)=>{
    g.setTransform(2,0,0,2,0,0);
    g.clearRect(0,0,122,80);
    /* 흐르는 레일 + 지주 (느린 패닝) */
    g.fillStyle='rgba(242,240,232,.85)';
    g.fillRect(0,33,122,2);
    const off=(tm*26+idx*17)%34;
    for(let px=-off;px<126;px+=34) g.fillRect(px,33,2,10);
    /* 흐르는 지면 텍스처 */
    g.strokeStyle='rgba(0,0,0,.10)'; g.lineWidth=1.2;
    for(let i=0;i<5;i++){
      const sx=((-(tm*60)+i*33+idx*11)%(122+34)+156)%156-17;
      const yy=62+((i*7+idx*3)%12);
      g.beginPath(); g.moveTo(sx,yy); g.lineTo(sx+16,yy); g.stroke();
    }
    /* 그림자 + 말 (슬로 캔터) */
    g.save(); g.translate(58,44);
    g.globalAlpha=.3; g.fillStyle='#141c10';
    g.beginPath(); g.ellipse(1,24,30,5,0,0,7); g.fill(); g.globalAlpha=1;
    drawHorseSprite(g,h,0.92,tm*0.5+idx*0.35,{running:true,t:tm});
    g.restore();
  });
  padRaf=requestAnimationFrame(paddockFrame);
}
function activePlayer(){
  for(let p=0;p<state.players;p++) if(!state.bets[p] || !state.bets[p].locked) return p;
  return -1;
}
function ensureBet(p){
  if(!state.bets[p]) state.bets[p]={type:'win', sel:[], stake:100, locked:false, odds:null};
  return state.bets[p];
}
function setType(p,type){
  const b=ensureBet(p); if(b.locked) return;
  b.type=type;
  /* 이미 고른 말은 유지하고, 새 방식이 요구하는 수만큼만 남긴다 (선택이 풀리지 않게) */
  const need=BET_TYPES[type].k;
  if(b.sel.length>need) b.sel=b.sel.slice(0,need);
  renderBetbar(); refreshCards();
}
function selectHorse(lane){
  const p=activePlayer(); if(p<0) return;
  const b=ensureBet(p); const need=BET_TYPES[b.type].k;
  const i=b.sel.indexOf(lane);
  if(i>=0) b.sel.splice(i,1);
  else if(need===1) b.sel=[lane];
  else { if(b.sel.length>=2) b.sel.shift(); b.sel.push(lane); }
  renderBetbar(); refreshCards();
}
/* 환급률: 단승/연승 80%, 복승 78.2%, 쌍승 73.5% (실제 경마와 유사하게 차등) */
function calcOdds(type,sel){
  const Hh=l=>state.horses.find(h=>h.lane===l);
  if(sel.length<BET_TYPES[type].k) return null;
  if(type==='win') return Hh(sel[0]).odds;      /* 실시간 변동 반영된 현재가 */
  if(type==='place'){
    const A=Hh(sel[0]); let pl=A.prob;
    state.horses.forEach(B=>{ if(B!==A) pl+=B.prob*A.prob/(1-B.prob); });
    return clampOdds((0.80/pl)*Math.pow(A.drift,0.7),1.1);
  }
  const A=Hh(sel[0]),B=Hh(sel[1]);
  const dAB=Math.sqrt(A.drift*B.drift);
  const pAB=A.prob*B.prob/(1-A.prob), pBA=B.prob*A.prob/(1-B.prob);
  if(type==='exacta') return clampOdds((0.735/pAB)*dAB,1.5);
  return clampOdds((0.782/(pAB+pBA))*dAB,1.3);
}
function clampOdds(o,min){ return Math.min(320, Math.max(min, Math.round(o*10)/10)); }
function selLabel(b){
  const Hh=l=>state.horses.find(h=>h.lane===l);
  if(b.sel.length===0) return t('selectHorse');
  if(BET_TYPES[b.type].k===1) return `${laneNo(b.sel[0])} ${Hh(b.sel[0]).name}`;
  const marks=b.type==='exacta'? [t('first'),t('second')] : ['',''];
  let s=`${marks[0]}${laneNo(b.sel[0])} ${Hh(b.sel[0]).name}`;
  if(b.sel[1]!=null) s+=` + ${marks[1]}${laneNo(b.sel[1])} ${Hh(b.sel[1]).name}`;
  else s+=' '+t('oneMore');
  return s;
}
function refreshCards(){
  document.querySelectorAll('.horse-card').forEach(c=>{
    c.classList.remove('pick1','pick2');
    const flags=c.querySelector('.pickflags'); flags.innerHTML='';
    const lane=+c.dataset.lane;
    state.bets.forEach((b,p)=>{
      if(!b || !b.sel.includes(lane)) return;
      c.classList.add(p===0?'pick1':'pick2');
      const idx=b.sel.indexOf(lane);
      const mark=b.type==='exacta'? (idx===0?'①':'②') : '✓';
      const s=document.createElement('span'); s.className='pf';
      s.style.background=p===0?'var(--p1)':'var(--p2)';
      s.textContent=(state.players===2?'P'+(p+1)+' ':'')+mark+(b.locked?' ✔':'');
      flags.appendChild(s);
    });
  });
}
function renderBetbar(popFor=-1){
  const bar=document.getElementById('betbar'); bar.innerHTML='';
  for(let p=0;p<state.players;p++){
    const b=state.bets[p];
    const tag=state.players===2? `<span class="tag ${p===0?'p1':'p2'}">P${p+1}</span>` : `<span class="tag p1">${t('myTicket')}</span>`;
    const row=document.createElement('div'); row.className='betrow';
    if(b && b.locked){
      row.innerHTML=`${tag}<span class="pickinfo">✅ <b>${betName(b.type)}</b> · ${selLabel(b)} · ${b.stake.toLocaleString()}<span class="cn"></span> × ${b.odds.toFixed(1)} = ${t('payoutIf')} <b style="color:var(--gold)">${Math.round(b.stake*b.odds).toLocaleString()}<span class="cn"></span></b></span>
        <button class="chip" onclick="unlock(${p})">${t('edit')}</button>`;
      bar.appendChild(row); continue;
    }
    const cur=b||{type:'win',sel:[],stake:100};
    const typeChips=Object.keys(BET_TYPES).map(id=>
      `<button class="chip type ${cur.type===id?'on':''}" onclick="setType(${p},'${id}')">${betName(id)}</button>`).join('');
    const odds=b? calcOdds(b.type,b.sel):null;
    const oddsTxt=odds? ` · ${t('odds')} <b style="color:var(--gold)">${odds.toFixed(1)}</b>`:'';
    const ready=b && b.sel.length>=BET_TYPES[b.type].k;
    row.innerHTML=`${tag}${typeChips}
      <span class="pickinfo">${b? selLabel(b):t('selectHorse')}${oddsTxt}</span>
      <button class="chip" onclick="bump(${p},-100)">-100</button>
      <span class="stake${popFor===p?' pop':''}">${cur.stake.toLocaleString()}<span class="cn"></span></span>
      <button class="chip" onclick="bump(${p},100)">+100</button>
      <button class="chip" onclick="bump(${p},500)">+500</button>
      <button class="chip" onclick="allin(${p})">${t('allIn')}</button>
      <button class="btn alt" style="padding:7px 15px; font-size:14px" ${ready?'':'disabled'} onclick="lockBet(${p})">${t('confirm')}</button>
      <span class="typedesc">${betDesc(cur.type)}</span>`;
    bar.appendChild(row);
  }
  const allLocked=[...Array(state.players).keys()].every(p=> state.bets[p] && state.bets[p].locked);
  const go=document.createElement('div'); go.className='betrow'; go.style.justifyContent='center';
  go.innerHTML=`<button class="chip" onclick="openOddsBoard()">${t('oddsBoard')}</button>`;
  if(allLocked){
    go.innerHTML+=`<button class="btn" style="font-size:19px; padding:13px 38px" onclick="beginRace()">${t('gateOpen')}</button>
      <button class="chip" onclick="skipBet()">${t('cancelBet')}</button>`;
  } else {
    go.innerHTML+=`<button class="chip" onclick="skipBet()">${t('spectate')}</button>`;
  }
  bar.appendChild(go);
}
/* ---- 배당판(오즈보드) 팝업 ---- */
function openOddsBoard(){ document.getElementById('oddsModal').classList.add('show'); renderOddsBoard(); }
function closeOddsBoard(){ document.getElementById('oddsModal').classList.remove('show'); }
function renderOddsBoard(){
  const body=document.getElementById('oddsPanelBody'); if(!body) return;
  const en=state.lang==='en';
  /* 단승/연승은 각 말별, 복승/쌍승은 인기 상위 조합 몇 개 */
  const rows=state.horses.map(h=>{
    const win=h.odds.toFixed(1);
    const pl=calcOdds('place',[h.lane]);
    return `<tr>
      <td class="nmc"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${h.color};margin-right:6px"></span>${laneNo(h.lane)} ${h.name}</td>
      <td class="owin">${win}</td>
      <td>${pl?pl.toFixed(1):'-'}</td>
      <td>${h.styleName}</td></tr>`;
  }).join('');
  /* 인기 복승 조합 상위 6 */
  const combos=[];
  for(let i=0;i<state.horses.length;i++) for(let j=i+1;j<state.horses.length;j++){
    const a=state.horses[i],b=state.horses[j];
    const q=calcOdds('quinella',[a.lane,b.lane]);
    combos.push({a,b,q});
  }
  combos.sort((x,y)=>x.q-y.q);
  const comboRows=combos.slice(0,6).map(c=>`<tr>
    <td class="nmc">${c.a.lane}–${c.b.lane} · ${c.a.name} / ${c.b.name}</td>
    <td class="owin">${c.q.toFixed(1)}</td></tr>`).join('');
  body.innerHTML=`
    <h3>${t('oddsBoard')} <button class="oddsClose" onclick="closeOddsBoard()">✕</button></h3>
    <table class="oddsTbl">
      <tr><th style="text-align:left">${en?'Horse':'출주마'}</th><th>${betName('win')}</th><th>${betName('place')}</th><th>${en?'Style':'각질'}</th></tr>
      ${rows}
    </table>
    <div style="margin-top:12px; color:#9fd7b0; font-size:12px; letter-spacing:1px">${betName('quinella')} ${en?'(popular combos)':'(인기 조합)'}</div>
    <table class="oddsTbl">${comboRows}</table>`;
}
function bump(p,amt){ const b=ensureBet(p); if(b.locked) return;
  b.stake=Math.min(Math.max(100,state.money[p]), Math.max(100,b.stake+amt)); renderBetbar(p); }
function allin(p){ const b=ensureBet(p); if(b.locked) return; b.stake=Math.max(100,state.money[p]); renderBetbar(p); }
function lockBet(p){
  const b=state.bets[p]; if(!b || b.sel.length<BET_TYPES[b.type].k) return;
  if(state.money[p]<100){ state.bets[p]=null; renderBetbar(); refreshCards(); return; }
  b.stake=Math.min(b.stake,state.money[p]);
  b.odds=calcOdds(b.type,b.sel);
  b.locked=true; renderBetbar(); refreshCards();
  printTicket(p);
}

/* ---- 마권 발권 애니메이션 ---- */
function ticketHTML(b,p){
  const serial=String((state.round*7919+p*131+b.stake)%100000000).padStart(8,'0');
  const stamp=state.players===2
    ? `<div class="tstamp p${p+1}">PLAYER&nbsp;${p+1}</div>` : '';
  return `${stamp}<h4>${t('ticketTitle')}</h4>
      <div class="trow"><span>${t('raceR')}${state.round} · ${state.raceMeters}m</span><span>${state.players===2?t('player')+' '+(p+1):t('counter')}</span></div>
      <div class="trow big"><span>${betName(b.type)}</span><span>${selLabel(b)}</span></div>
      <div class="trow"><span>${t('odds')}</span><span>× ${b.odds.toFixed(1)}</span></div>
      <div class="trow"><span>${t('buyAmt')}</span><span>${b.stake.toLocaleString()} <span class="cn"></span></span></div>
      <div class="trow big"><span>${t('winReturn')}</span><span>${Math.round(b.stake*b.odds).toLocaleString()} <span class="cn"></span></span></div>
      <div class="tbar"></div>
      <div class="serial">NO.${serial} · GRAND TURF CLUB</div>`;
}
function printTicket(p){
  const b=state.bets[p]; if(!b) return;
  const old=document.getElementById('ticketLayer'); if(old) old.remove();
  const layer=document.createElement('div'); layer.id='ticketLayer';
  layer.innerHTML=`<div class="tmask"><div class="ticket">${ticketHTML(b,p)}</div></div>
    <div class="tslot"></div>`;
  document.getElementById('app').appendChild(layer);
  const tk=layer.querySelector('.ticket');
  printSound();
  requestAnimationFrame(()=>requestAnimationFrame(()=>tk.classList.add('emerge')));
  /* 발권 후 충분히 볼 수 있게 머무름 → 탭하거나 4.5초 뒤 회수 */
  let dismissed=false;
  const dismiss=()=>{
    if(dismissed) return; dismissed=true;
    tk.classList.remove('emerge'); tk.style.transform='translateY(0)';
    tk.classList.add('fly');
    setTimeout(()=>layer.remove(),650);
  };
  layer.style.pointerEvents='auto'; layer.style.cursor='pointer';
  layer.onclick=dismiss;
  setTimeout(dismiss,4500);
}
/* 경기 중 좌상단 미니 마권 → 클릭 시 확대 */
function renderMiniTickets(){
  const box=document.getElementById('miniTickets'); box.innerHTML='';
  document.getElementById('ticketZoom').classList.remove('show');
  state.bets.forEach((b,p)=>{
    if(!b) return;
    const d=document.createElement('div');
    d.className='mticket '+(p===0?'mp1':'mp2');
    const pTag=state.players===2
      ?`<span class="mpTag ${p===0?'mp1t':'mp2t'}">P${p+1}</span> `:'🎫 ';
    d.innerHTML=`${pTag}${betName(b.type)} ${b.sel.map(laneNo).join('·')} ×${b.odds.toFixed(1)} · ${b.stake.toLocaleString()}<span class="cn"></span>`;
    d.onclick=()=>{
      const z=document.getElementById('ticketZoom');
      z.innerHTML=`<div class="ticket">${ticketHTML(b,p)}</div>`;
      z.classList.add('show');
    };
    box.appendChild(d);
  });
}
function unlock(p){ if(state.bets[p]) state.bets[p].locked=false; renderBetbar(); refreshCards(); }
function skipBet(){ state.bets=[null,null]; beginRace(); }

/* ============================ 레이스 ============================ */
let raf=null;

function beginRace(){
  show('screen-race');
  closeOddsBoard();
  const _sb=document.getElementById('skipBtn'); _sb.classList.remove('show'); _sb.textContent=t('skipResult');
  document.getElementById('tDistLeft').textContent=t('distLeft');
  document.getElementById('tElapsed').textContent=t('elapsed');
  document.getElementById('voiceBtn').textContent=voiceOn?t('voiceOn'):t('voiceOff');
  setupTrack();
  makeTVBackground();
  window.onresize=()=>{ if(document.getElementById('screen-race').classList.contains('active')){ setupTrack(); makeTVBackground(); buildRankStrip(); } };

  state.stakePaid=[0,0];
  for(let p=0;p<state.players;p++){
    const b=state.bets[p];
    if(b && b.locked && b.stake>0){ state.money[p]-=b.stake; state.stakePaid[p]=b.stake; }
    else state.bets[p]=null;
  }

  state.horses.forEach((h,i)=>{
    h.dist=1; h.spd=0; h.off=i+0.5; h.finished=false; h.finishOrder=0; h.rank=i+1; h.whip=false; h.surge=0; h.surgeAmt=0;
    h.fallen=false; h.retired=false; h.fallT=0; h.fallProg=0; h.retireOrder=0;
    /* 당일 컨디션 (비공개): 배당엔 반영 안 됨 → 클수록 이변 잦음
       평소 ±6%, 18% 확률로 대박/난조의 날 */
    let m=1+(Math.random()+Math.random()+Math.random()-1.5)*0.04;
    const r=Math.random();
    if(r<0.11)      m+=0.06+Math.random()*0.10;   /* 인생 경주 (숨은 대박마) */
    else if(r>0.89) m-=0.06+Math.random()*0.09;   /* 컨디션 난조 */
    h.todayM=m;
    /* 페이스 웨이브: 레이스 중 에너지 분배가 물결치며 순위가 출렁이게 (평균은 0) */
    h.waveA=0.045+Math.random()*0.05;    /* 페이스 웨이브 진폭 ↑ → 순위 출렁임 강화 */
    h.waveK=3+Math.random()*3.5;
    h.waveP=Math.random()*6.283;
    h.lastPrint=1; h.printSide=false;
  });
  /* 결승선: 정해진 바퀴 수 + 아래 직선주로 중앙 (경주 종류에 따라 바퀴 수 가변) */
  const partial=2*track.a + Math.PI*track.R + track.a;
  state.finishDist=Math.floor(state.laps)*track.perim + partial;
  state.parkGate=(Math.floor(state.laps)+1)*track.perim;   /* 완주 후 이 지점(게이트) 지나면 퇴장 */
  state.t=0; state.raceTime=0; state.started=false;
  state.finishedCount=0; state.results=[]; state.afterFinish=0; state.podiumT=0; state.confirmed=0;
  state.lastLeader=0; state.lapFlags={}; state.stretchCalled=false; state.bellDone=false;
  state.caption={text:'',timer:0};
  state.flash=0; state.shutter=0;
  state.retiredCount=0; state.retireSeq=0; state.dustPuffs=[];
  /* 낙마 사고: 통계적으로 드묾 → 이 경주에 사고가 있을지 미리 결정(약 16%) */
  if(Math.random()<0.16){
    const victim=state.horses[Math.floor(Math.random()*N)];
    state.incident={lane:victim.lane, prog:0.25+Math.random()*0.55};   /* 이 진행도에서 넘어짐 */
  } else state.incident=null;
  state.replay={frames:[]}; state.recording=false; state.crossTimes={};
  state.finalOrder=null; state.photo=null;
  state.tv={mode:'lead', label:'리딩 그룹', camDist:0, scale:1.9, shotTimer:5, particles:[], prevFocus:null};
  state.prints=[];
  buildRankStrip();
  renderMiniTickets();

  const cd=document.getElementById('countdown');
  drawTrackBase(); state.horses.forEach(h=>drawHorseOnTrack(h,false));
  drawTV(0);
  /* 카운트다운 전에 팡파르 → 그 뒤 3·2·1·GO */
  cd.style.fontSize='64px'; cd.textContent='🎺';
  playFanfare(0.9);
  setTimeout(()=>{
    cd.style.fontSize='';
    let n=3; cd.textContent=n; beep(660,0.14);
    const iv=setInterval(()=>{
      n--;
      if(n>0){ cd.textContent=n; beep(660,0.14); }
      else if(n===0){ cd.textContent=state.lang==='en'?'GO!':'출발!'; beep(1050,0.5,0.26); gateBell(); crowdStart(); crowdSet(0.34,1.5); }
      else { clearInterval(iv); cd.textContent='';
        state.started=true; state.last=performance.now();
        cap('출발! 게이트가 열렸습니다',"They're off! The gates are open!");
        speak("And they're off! Racing away here at the Grand Turf!",{rate:1.28,pitch:0.95});
        loop(); }
    },800);
  }, 2200);   /* 팡파르 여운 후 카운트다운 시작 */
}

function setCaption(text){ state.caption={text,timer:3.6}; }
function cap(ko,en){ setCaption(state.lang==='en'?en:ko); }

function loop(){
  const now=performance.now();
  let dt=(now-state.last)/1000; state.last=now; dt=Math.min(dt,0.05);
  state.t+=dt; state.raceTime+=dt;
  updateRace(dt);
  drawTrackBase();
  drawPrints(dt);
  [...state.horses]
    .sort((a,b)=> pointAt(a.dist,a.off).y - pointAt(b.dist,b.off).y)
    .forEach(h=>drawHorseOnTrack(h,!h.finished||h.spd>18));
  drawParkedHorses();
  drawTV(dt);
  /* 1·2·3위가 결승 후 게이트(출발대)에 도착할 때까지 경기를 계속 보여준 뒤 포토판독으로 넘어간다.
     (중앙 1·2·3위 표시는 포토판독에서 확정될 때 나타남) */
  const need=Math.min(3, N-state.retiredCount);
  const topAtGate=state.horses.filter(h=>h.finished && h.finishOrder>=1 && h.finishOrder<=3 && h.dist>=state.parkGate).length;
  if(state.finishedCount>0) state.afterFinish+=dt;
  if(topAtGate>=need){ startPhotoReplay(); return; }       /* 1·2·3위 게이트 도착 → 포토판독 */
  if(state.afterFinish>50){ startPhotoReplay(); return; }  /* 이례적 상황 안전장치 */
  raf=requestAnimationFrame(loop);
}

/* 사진판독 중 노출되는 "결과 보기" 버튼 → 판독을 건너뛰고 결과 화면으로 */
function skipToResult(){
  const btn=document.getElementById('skipBtn'); if(btn) btn.classList.remove('show');
  cancelAnimationFrame(raf);
  finishRace();
}

function updateRace(dt){
  const base=track.perim*0.056;
  const hs=state.horses;

  /* ----- 코스 취하기: 레일 파고들기 + 추월 ----- */
  hs.forEach(h=>{
    if(h.finished){ h.off+=clamp(0.55-h.off,-dt*0.6,dt*0.6); return; }
    let targetOff=0.45;                      /* 기본: 최단 코스 */
    let blocker=null;
    hs.forEach(o=>{
      if(o===h) return;
      const gapD=o.dist-h.dist;
      if(gapD>0 && gapD<52 && Math.abs(o.off-h.off)<0.75){
        if(!blocker || o.dist<blocker.dist) blocker=o;
      }
    });
    if(blocker){
      const inSpace=blocker.off-0.95;
      /* 안쪽 공간이 있으면 절반 확률로 인코스 찌르기, 아니면 바깥 추월 */
      if(inSpace>0.4 && (h.lane+blocker.lane)%2===0) targetOff=inSpace;
      else targetOff=blocker.off+0.95;
    }
    h.off+=clamp(targetOff-h.off, -dt*0.6, dt*0.6);   /* 코스 변경을 완만하게 → TV 튐 감소 */
  });
  /* 측면 분리 (충돌 방지) */
  for(let i=0;i<hs.length;i++) for(let j=i+1;j<hs.length;j++){
    const a=hs[i],b=hs[j];
    if(Math.abs(a.dist-b.dist)<32 && Math.abs(a.off-b.off)<0.62){
      const push=dt*1.0*(a.off>=b.off?1:-1);
      a.off+=push/2; b.off-=push/2;
    }
  }
  hs.forEach(h=>{ h.off=clamp(h.off,0.35,N-0.4); });

  /* ----- 낙마 사고 처리 ----- */
  if(state.incident){
    const v=state.horses.find(h=>h.lane===state.incident.lane);
    if(v && !v.fallen && !v.finished && v.dist/state.finishDist>=state.incident.prog){
      v.fallen=true; v.fallT=state.raceTime;
      state.incident=null;
      fallSound();
      cap(`⚠️ ${v.lane}번 ${v.name} 낙마! 아찔한 순간입니다!`,`⚠️ ${laneNo(v.lane)} ${v.name} has fallen! A scary moment!`);
      speak(`Oh no! Number ${v.lane} has gone down! A terrible fall!`,{rate:1.1,pitch:0.86});
      crowdLevel(0.15);   /* 관중 술렁 */
    }
  }
  hs.forEach(h=>{
    if(h.fallen && !h.retired){
      h.spd=Math.max(0,h.spd-dt*base*3.5);   /* 급감속 후 정지 */
      h.dist+=h.spd*dt;
      if(state.raceTime-h.fallT>3 && !h.retired){   /* 3초 후 리타이어 확정 */
        h.retired=true; h.retireOrder=++state.retireSeq; state.retiredCount++;
        cap(`🚑 ${h.lane}번 ${h.name} 리타이어`,`🚑 ${laneNo(h.lane)} ${h.name} retired`);
      }
    }
  });

  /* ----- 속도 ----- */
  hs.forEach(h=>{
    if(h.fallen) return;   /* 낙마마는 위에서 처리 */
    if(h.finished){
      /* 결승선 통과 후에는 원래 속도의 0.7배로 계속 달림 (멈추거나 사라지지 않음) */
      const cruise=base*h.strength*0.7;
      h.spd+=(cruise-h.spd)*Math.min(1,dt*1.5);
      h.dist+=h.spd*dt*arcFactor(h.dist,h.off);
      return;
    }
    const prog=h.dist/state.finishDist;
    let styleM=1;
    if(h.style==='front')   styleM=1.055-0.085*prog;
    if(h.style==='closer')  styleM=0.955+0.105*prog*prog;
    if(h.style==='stalker') styleM=1.0+0.018*Math.sin(prog*Math.PI);
    /* 카오스 엔벨로프: 초반엔 잔잔, 종반(마지막 1~2바퀴)일수록 출렁임 증폭
       (제로평균이라 최종 승률에는 영향 최소) */
    const chaos=0.35+1.75*Math.pow(prog,2.4);
    styleM*=1+h.waveA*chaos*Math.sin(prog*Math.PI*h.waveK+h.waveP);
    if(h.surge>0) h.surge-=dt;
    const surgeRate=(0.012+0.055*prog*prog);                   /* 종반일수록 스퍼트/탈진 빈발 */
    if(Math.random()<surgeRate){ h.surge=0.5+Math.random()*1.1; h.surgeAmt=(Math.random()<0.5?-1:1)*(0.06+Math.random()*0.15)*(0.6+prog); }
    const noise=(Math.random()-0.5)*(0.07+0.10*prog);
    let target=base*h.strength*h.todayM*styleM*(1+noise+(h.surge>0?h.surgeAmt:0));
    /* 전방 밀착시 감속 / 슬립스트림 */
    hs.forEach(o=>{
      if(o===h||o.finished) return;
      const gapD=o.dist-h.dist, lat=Math.abs(o.off-h.off);
      if(gapD>0&&gapD<34&&lat<0.55) target=Math.min(target,o.spd*0.985);
      else if(gapD>34&&gapD<75&&lat<0.4) target*=1.012;
    });
    h.spd+=(target-h.spd)*Math.min(1,dt*3.5);
    h.dist+=h.spd*dt*arcFactor(h.dist,h.off);
    if(h.dist+NOSE>=state.finishDist && !h.finished){   /* 코끝이 선에 닿는 순간 */
      h.finished=true; state.finishedCount++;
      h.finishOrder=state.finishedCount; state.results.push(h);
      state.crossTimes[h.finishOrder]=state.raceTime;
      if(h.finishOrder===1){
        cap(`${h.lane}번 ${h.name}, 결승선 통과! 🏁`,`${laneNo(h.lane)} ${h.name} crosses the line! 🏁`);
        speak(`And it's number ${h.lane}, ${h.name}, taking it at the wire!`,{rate:1.34,pitch:1.02});
        state.flash=0.75;
        crowdSet(1.0,0.25);             /* 골인 순간 함성 폭발 */
        crowdCheer(0.95);               /* 큰 환호 원샷 */
      }
    }
  });

  /* 발굽자국 생성 (일정 거리마다) */
  hs.forEach(h=>{
    while(h.dist-h.lastPrint>24){
      h.lastPrint+=24;
      const pp=pointAt(h.lastPrint,h.off), qq=pointAt(h.lastPrint+3,h.off);
      state.prints.push({x:pp.x,y:pp.y,a:Math.atan2(qq.y-pp.y,qq.x-pp.x),
        s:(h.printSide=!h.printSide)?1:-1, life:1});
    }
  });
  if(state.prints.length>420) state.prints.splice(0,state.prints.length-420);

  const order=raceOrder();
  order.forEach((h,i)=>h.rank=i+1);

  /* 해설 & 채찍 */
  const lead=order[0];
  if(!lead.finished){
    if(state.lastLeader!==lead.lane){
      if(state.lastLeader!==0){
        cap(`${lead.lane}번 ${lead.name}, 선두로 나섭니다!`,`${laneNo(lead.lane)} ${lead.name} takes the lead!`);
        speak(`Number ${lead.lane}, ${lead.name}, surges to the front!`,{rate:1.18,pitch:0.9});
      }
      state.lastLeader=lead.lane;
    }
    const lap=Math.floor(lead.dist/track.perim)+1;
    if(lap>1 && !state.lapFlags[lap]){ state.lapFlags[lap]=true;
      cap(`선두 ${lead.lane}번, ${lap}바퀴째 진입`,`Leader ${laneNo(lead.lane)} enters lap ${lap}`);
      speak('And here they come around again!',{rate:1.15,pitch:0.88}); }
    const remain=state.finishDist-lead.dist;
    if(!state.stretchCalled && remain<track.perim*0.28){
      state.stretchCalled=true;
      cap('최후의 직선주로! 채찍이 나옵니다!','Into the final stretch — the whips are out!');
      speak('Into the final stretch, and the whips are OUT!',{rate:1.34,pitch:1.02});
    }
  }
  hs.forEach(h=>{ h.whip=state.stretchCalled && !h.finished && h.rank<=5; });

  /* 관중 함성: 결승 한 바퀴 전부터 남은 거리에 비례해 점점 커진다 */
  if(state.finishedCount===0){
    const remainLead=state.finishDist-order[0].dist;
    const base=0.34;
    if(remainLead<track.perim){
      const u=clamp(1-remainLead/track.perim,0,1);   /* 0(1바퀴 전)→1(결승선) */
      crowdLevel(base + Math.pow(u,1.6)*0.55);        /* 최대 ~0.9 */
      /* 마지막 1바퀴 진입 → 약 5초간 빠른 종소리 */
      if(!state.bellDone){ state.bellDone=true; finalLapBell(); cap('마지막 바퀴! 종이 울립니다 🔔','Final lap! The bell rings 🔔'); }
    } else {
      crowdLevel(base);
    }
  }

  /* 포토피니시 리플레이 녹화 (결승선 부근) */
  if(!state.recording && !lead.finished && state.finishDist-lead.dist<300) state.recording=true;
  if(state.recording && state.replay.frames.length<1500){
    const stop=state.crossTimes[3] && state.raceTime>state.crossTimes[3]+0.8;
    if(!stop) state.replay.frames.push({rt:state.raceTime, d:state.horses.map(h=>[h.dist,h.off])});
  }

  updateTVCamera(dt,order);
  updateHud(order);
}

function raceOrder(){
  return [...state.horses].sort((a,b)=>{
    /* 낙마/리타이어는 최하위로 (먼저 넘어진 말이 더 아래) */
    const aRet=a.fallen||a.retired, bRet=b.fallen||b.retired;
    if(aRet&&bRet) return a.fallT-b.fallT;
    if(aRet) return 1;
    if(bRet) return -1;
    if(a.finished&&b.finished) return a.finishOrder-b.finishOrder;
    if(a.finished) return -1;
    if(b.finished) return 1;
    return b.dist-a.dist;
  });
}

/* 순위 칩: 한 번만 생성하고 transform으로 부드럽게 재정렬. 간격은 실제 컨테이너 폭에 맞춰 계산(잘림 방지) */
function rankStep(){
  const cw=document.getElementById('rankStrip').clientWidth||N*140;
  return Math.max(96, cw/N);
}
function buildRankStrip(){
  const rs=document.getElementById('rankStrip');
  rs.classList.remove('show');   /* 레이스 시작 시 숨김 → 10초 후 등장 */
  rs.innerHTML='';
  const step=rankStep(); state.rankStep=step;
  state.horses.forEach((h,i)=>{
    const d=document.createElement('div');
    d.className='rchip'; d.id='rchip-'+h.lane;
    d.style.width=(step-6)+'px';
    d.style.transform=`translateX(${i*step}px)`;
    let mark='';
    state.bets.forEach((b,p)=>{ if(b&&b.sel.includes(h.lane)){
      d.classList.add(p===0?'mine1':'mine2');
      mark+=`<span class="bmk b${p+1}">${state.players===2?'P'+(p+1):'🎫'}</span>`; }});
    d.innerHTML=`<span class="rk">-</span>
      <span class="lane" style="background:${h.color}">${h.lane}</span>
      <span class="nm">${h.name}</span>${mark}<span class="fin"></span>`;
    rs.appendChild(d);
  });
}
const RANK_REVEAL=10;   /* 초: 이 시간 이후에 순위표 등장 */
function updateHud(order){
  const leaderRemain=Math.max(0,state.finishDist-order[0].dist);
  document.getElementById('distLeft').textContent=Math.ceil(leaderRemain/state.finishDist*state.raceMeters)+' m';
  document.getElementById('clock').textContent=state.raceTime.toFixed(1)+(state.lang==='en'?'s':'초');
  const rs=document.getElementById('rankStrip');
  if(state.raceTime>=RANK_REVEAL) rs.classList.add('show');
  const step=state.rankStep||rankStep();
  order.forEach((h,i)=>{
    const d=document.getElementById('rchip-'+h.lane); if(!d) return;
    const tx=`translateX(${i*step}px)`;
    if(d.style.transform!==tx) d.style.transform=tx;
    const ret=h.fallen||h.retired;
    const rk=d.querySelector('.rk');
    const ord=ret?'—':ordinal(h.rank);
    if(rk.textContent!==ord) rk.textContent=ord;
    const fin=d.querySelector('.fin');
    const ft=h.retired?'🚑':h.fallen?'⚠️':h.finished?'🏁':'';
    if(fin.textContent!==ft) fin.textContent=ft;
    const dim=ret?'0.5':'1';
    if(d.style.opacity!==dim) d.style.opacity=dim;
  });
}

/* ============================ TV 중계 ============================ */
let tvBG=null, tvBGW=0;
function hashRnd(i){ const x=Math.sin(i*127.1+311.7)*43758.5453; return x-Math.floor(x); }

function makeTVBackground(){
  /* 절반 해상도로 그려 확대 → 부드러운 망원 심도 */
  tvBGW=1400;
  tvBG=document.createElement('canvas');
  tvBG.width=tvBGW/2; tvBG.height=TVH/2;
  const g=tvBG.getContext('2d');
  g.scale(0.5,0.5);
  const w=tvBGW, hgt=TVH;
  const skyH=hgt*0.30;
  /* 하늘 */
  const sky=g.createLinearGradient(0,0,0,skyH);
  sky.addColorStop(0,'#a8c4dc'); sky.addColorStop(1,'#dde8ee');
  g.fillStyle=sky; g.fillRect(0,0,w,skyH);
  g.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<7;i++){
    const cx=hashRnd(i+3)*w, cy=skyH*0.2+hashRnd(i+9)*skyH*0.4;
    g.beginPath(); g.ellipse(cx,cy,40+hashRnd(i)*50,9,0,0,7); g.fill();
  }
  /* 관중석 */
  g.fillStyle='#4a545c'; g.fillRect(0,skyH*0.55,w,skyH*0.45+hgt*0.06);
  g.fillStyle='#39434a';
  for(let sx=0;sx<w;sx+=175){
    g.beginPath();
    g.moveTo(sx,skyH*0.55); g.lineTo(sx+78,skyH*0.22); g.lineTo(sx+165,skyH*0.55);
    g.closePath(); g.fill();
  }
  /* 관중: 머리+몸 실루엣 (열 배치로 스탠드에 앉은 느낌) */
  for(let i=0;i<620;i++){
    const rx=hashRnd(i)*w, ry=skyH*0.6+hashRnd(i+999)*(skyH*0.4+hgt*0.05);
    const shirt=`hsla(${hashRnd(i+55)*360|0},48%,${48+hashRnd(i+77)*22|0}%,.9)`;
    const skin=`hsla(30,42%,${55+hashRnd(i+31)*15|0}%,.9)`;
    g.fillStyle=shirt; g.beginPath(); g.ellipse(rx,ry+2.4,3.1,4,0,0,7); g.fill();
    g.fillStyle=skin; g.beginPath(); g.arc(rx,ry-2,2.5,0,7); g.fill();
    if(hashRnd(i+41)>0.82){                                   /* 일부는 팔을 들고 있음 */
      g.strokeStyle=shirt; g.lineWidth=1.6; g.lineCap='round';
      g.beginPath(); g.moveTo(rx-2,ry+1); g.lineTo(rx-4.5,ry-6); g.stroke();
      g.beginPath(); g.moveTo(rx+2,ry+1); g.lineTo(rx+4.5,ry-6); g.stroke();
    }
  }
  /* 광고판 */
  g.fillStyle='#1a5c38'; g.fillRect(0,skyH+hgt*0.055,w,hgt*0.05);
  g.fillStyle='rgba(255,255,255,.75)'; g.font='bold 13px sans-serif'; g.textAlign='center';
  for(let sx=90;sx<w;sx+=280){ g.fillText('GRAND TURF CLUB',sx,skyH+hgt*0.055+hgt*0.033); }
}

function updateTVCamera(dt,order){
  const tv=state.tv;
  tv.shotTimer-=dt;
  const lead=order[0];
  const remain=state.finishDist-lead.dist;
  const stretch=remain<track.perim*0.28;

  if(lead.finished){
    if(tv.mode!=='finish'){ tv.mode='finish'; tv.label='골인!'; tv.targetScale=2.35; tv.prevFocus=null; tv.prevTarget=null; }
  } else if(stretch){
    if(tv.mode!=='stretch'){ tv.mode='stretch'; tv.label='직선주로 스퍼트!'; tv.targetScale=2.15; tv.shotTimer=99; tv.prevFocus=null; tv.prevTarget=null; }
  } else if(tv.shotTimer<=0){
    const modes=[
      {m:'lead',    l:'리딩 그룹',   s:2.0},
      {m:'battle',  l:'접전!',       s:2.55},
      {m:'pack',    l:'중위권 다툼',  s:1.75},
    ];
    let pickIdx=Math.floor(Math.random()*modes.length);
    const gap01=Math.abs(order[0].dist-order[1].dist);
    if(gap01<track.perim*0.012 && Math.random()<0.55) pickIdx=1;
    const m=modes[pickIdx];
    tv.mode=m.m; tv.label=m.l; tv.targetScale=m.s;
    tv.shotTimer=6+Math.random()*4;     /* 샷을 더 오래 유지 → 덜 어수선 */
    tv.prevFocus=null; tv.prevTarget=null;
  }
  if(!tv.targetScale) tv.targetScale=2.0;

  /* 카메라 목표 지점 */
  let targetDist;
  if(tv.mode==='battle'){
    let bi=0,bg=1e9;
    for(let i=0;i<Math.min(3,order.length-1);i++){
      const gp=Math.abs(order[i].dist-order[i+1].dist);
      if(gp<bg){bg=gp;bi=i;}
    }
    targetDist=(order[bi].dist+order[bi+1].dist)/2;
  } else if(tv.mode==='pack'){
    const mid=order.slice(Math.min(2,order.length-1),Math.min(5,order.length));
    targetDist=mid.reduce((s,h)=>s+h.dist,0)/mid.length;
  } else if(tv.mode==='finish'){
    targetDist=state.finishDist-10;
  } else {
    targetDist=lead.dist-14;
  }
  /* 리더 안전권: 다른 그룹을 잡고 있는 숏이라도 목표지점 자체를 리더 쪽으로 당겨서
     프레임 경계에 다다르기 전에 미리 보정한다 (급격한 스냅 대신 부드러운 추종) */
  if(!lead.finished){
    const safeAhead=(TVW*0.40-130)/(PXD*Math.max(1,tv.scale));
    targetDist=Math.max(targetDist, lead.dist-safeAhead);
  }
  /* ---- 무조건 매끄러운 스테디캠 ----
     ① 목표를 저역통과 필터로 부드럽게(배틀 페어 교체 등 고주파 점프 제거)
     ② 필터된 목표의 '속도'를 저역통과해 피드포워드(지연 없이 따라가되 튐 없음)
     ③ 위치 보정 lerp. 스냅/하드클램프 없음. */
  if(tv.camDist===0){ tv.camDist=targetDist; tv.focus=targetDist; tv.prevTarget=targetDist; tv.vel=0; }
  if(tv.focus==null) tv.focus=targetDist;
  if(tv.prevTarget==null){ tv.prevTarget=targetDist; tv.vel=0; }   /* 샷 전환 직후 재시드 (속도 스파이크 방지) */
  tv.focus+=(targetDist-tv.focus)*Math.min(1,dt*3.2);              /* ① */
  let tvel=(tv.focus-tv.prevTarget)/Math.max(1e-3,dt);
  tv.prevTarget=tv.focus;
  tv.vel=(tv.vel||0)+(tvel-(tv.vel||0))*Math.min(1,dt*3.5);        /* ② 속도 저역통과 */
  tv.vel=clamp(tv.vel,-track.perim*0.4,track.perim*0.4);
  tv.camDist+=tv.vel*dt;                                           /* 피드포워드 */
  tv.camDist+=(tv.focus-tv.camDist)*Math.min(1,dt*2.4);            /* ③ 위치 보정 */
  tv.targetScale*=1+dt*0.004;                                      /* 켄 번즈 줌인 (미세) */
  tv.scale+=(tv.targetScale-tv.scale)*Math.min(1,dt*1.5);         /* 부드러운 줌 */
}

function drawTV(dt,fxDt){
  fxDt=fxDt==null?dt:fxDt;      /* dt=장면 시간(슬로모 가능), fxDt=실시간(자막·플래시·셔터) */
  const g=tvx, w=TVW, hgt=TVH;
  const tv=state.tv;
  if(!tv){ g.fillStyle='#000'; g.fillRect(0,0,w,hgt); return; }
  const shakeAmp=tv.mode==='stretch'||tv.mode==='finish'? 2.2:1.1;
  const shx=(Math.sin(state.t*27)+Math.sin(state.t*13.7))*shakeAmp*0.5;
  const shy=(Math.sin(state.t*31.3)+Math.sin(state.t*17.1))*shakeAmp*0.35;

  g.clearRect(0,0,w,hgt);
  g.save();
  g.translate(shx,shy);

  drawWideScene(g,w,hgt,dt); g.restore();

  /* ----- 방송 그래픽 (공통 오버레이) ----- */
  drawBroadcastOverlay(g,w,hgt,dt,fxDt);
}

function drawWideScene(g,w,hgt,dt){
  const tv=state.tv;
  const parallax=tv.camDist*tv.scale;
  /* 배경 (망원 압축 느낌으로 느리게) */
  if(tvBG){
    const off=((parallax*0.12)%tvBGW+tvBGW)%tvBGW;
    g.drawImage(tvBG,0,0,tvBG.width,tvBG.height, -off,0,tvBGW,hgt);
    g.drawImage(tvBG,0,0,tvBG.width,tvBG.height, tvBGW-off,0,tvBGW,hgt);
  }
  /* 관중석 카메라 플래시 (종반·골인 직후일수록 많이) — 경마장 관중과 비례 */
  {
    const excite=(state.finishedCount>0)?1:(state.stretchCalled?0.55:0.12);
    const nFlash=Math.round(excite*7);
    const skyH=hgt*0.30;
    for(let i=0;i<nFlash;i++){
      if(Math.random()<0.5) continue;
      const fx=Math.random()*w, fy=skyH*0.5+Math.random()*skyH*0.5;
      g.fillStyle='rgba(255,255,255,.28)'; g.beginPath(); g.arc(fx,fy,5+Math.random()*4,0,7); g.fill();
      g.fillStyle='rgba(255,255,255,.95)'; g.beginPath(); g.arc(fx,fy,1.6+Math.random()*1.6,0,7); g.fill();
    }
  }
  const grassY=hgt*0.42, dirtTop=hgt*0.48;
  /* 잔디 중경 */
  const gr=g.createLinearGradient(0,grassY,0,dirtTop);
  gr.addColorStop(0,'#3f7d3b'); gr.addColorStop(1,'#356a32');
  g.fillStyle=gr; g.fillRect(0,grassY,w,dirtTop-grassY);
  /* 안쪽 레일 (먼쪽) */
  const railY=grassY+2;
  g.fillStyle='rgba(0,0,0,.2)'; g.fillRect(0,railY+3,w,3);
  g.fillStyle='#eeece2'; g.fillRect(0,railY,w,3); g.fillRect(0,railY+8,w,2.4);
  const postOff=((parallax*0.55)%48+48)%48;
  for(let px=-postOff;px<w+48;px+=48) g.fillRect(px,railY,3.4,hgt*0.075);

  /* 흙 주로 전경 */
  const dirt=g.createLinearGradient(0,dirtTop,0,hgt);
  dirt.addColorStop(0,'#9e7442'); dirt.addColorStop(0.5,'#8d6538'); dirt.addColorStop(1,'#7a562f');
  g.fillStyle=dirt; g.fillRect(0,dirtTop,w,hgt-dirtTop);
  /* 주로 스피드 텍스처 */
  g.strokeStyle='rgba(60,40,20,.18)'; g.lineWidth=1.6;
  for(let i=0;i<26;i++){
    const yy=dirtTop+6+hashRnd(i+77)*(hgt-dirtTop-14);
    const depth=(yy-dirtTop)/(hgt-dirtTop);
    const speed=(0.9+depth*1.9);
    const sx=((-(parallax*speed)+hashRnd(i)*1100)%(w+160)+(w+160))%(w+160)-80;
    const len=26+hashRnd(i+13)*60*(0.5+depth);
    g.beginPath(); g.moveTo(sx,yy); g.lineTo(sx+len,yy+depth*1.5); g.stroke();
  }
  g.strokeStyle='rgba(255,240,215,.10)'; g.lineWidth=1.2;
  for(let i=0;i<12;i++){
    const yy=dirtTop+10+hashRnd(i+177)*(hgt-dirtTop-20);
    const depth=(yy-dirtTop)/(hgt-dirtTop);
    const sx=((-(parallax*(1.1+depth*1.8))+hashRnd(i+50)*900)%(w+160)+(w+160))%(w+160)-80;
    g.beginPath(); g.moveTo(sx,yy); g.lineTo(sx+40+depth*50,yy); g.stroke();
  }

  /* 결승선 (카메라 시야에 들어오면) */
  const finX=w*0.56+(state.finishDist-tv.camDist)*PXD*tv.scale;
  if(finX>-60 && finX<w+60){
    g.fillStyle='#c8c4b6'; g.fillRect(finX-2,grassY-hgt*0.16,5,hgt*0.16);
    g.fillStyle='#b03a2e';
    g.beginPath(); g.arc(finX+0.5,grassY-hgt*0.16,7,0,7); g.fill();
    g.fillStyle='rgba(240,240,235,.85)';
    for(let yy=dirtTop;yy<hgt;yy+=14) g.fillRect(finX-1.5+((yy-dirtTop)*0.08),yy,4,8);
  }

  /* ----- 말들 ----- */
  const sorted=[...state.horses].sort((a,b)=>a.off-b.off);  /* 안쪽(먼쪽)부터 */
  sorted.forEach(h=>{
    const x=w*0.56+(h.dist-tv.camDist)*PXD*tv.scale;
    if(x<-140||x>w+140) return;
    const depth=(h.off-0.35)/(N-0.75);                       /* 0=레일(멀리) 1=바깥(가까이) */
    const y=dirtTop+(hgt-dirtTop)*(0.22+depth*0.52);
    const sc=tv.scale*(0.82+depth*0.30);
    const cyc=h.dist*0.014+h.lane*0.37;
    const running=!h.finished||h.spd>18;

    /* 그림자 */
    g.globalAlpha=.32; g.fillStyle='#241505';
    g.beginPath(); g.ellipse(x+3,y+29*sc*0.55+4,40*sc*0.55,7*sc*0.55,0,0,7); g.fill();
    g.globalAlpha=1;

    /* 흙덩이 파티클 생성 (슬로모에선 적게) */
    if(running && dt>0 && Math.random()<Math.min(0.85,45*dt)){
      tv.particles.push({
        x:x-30*sc*0.55, y:y+26*sc*0.55,
        vx:-(60+Math.random()*90)*sc*0.4, vy:-(30+Math.random()*70)*sc*0.4,
        life:0.45+Math.random()*0.3, size:(1.5+Math.random()*2.5)*sc*0.45,
        col:Math.random()<0.5?'#6b4a26':'#8a6234'});
    }

    if(h.fallen){
      /* 낙마: 쓰러진 자세 + 먼지 */
      const since=state.raceTime-h.fallT, tip=Math.min(1,since*2.2);
      g.save(); g.translate(x,y);
      g.globalAlpha=Math.max(0,0.55-since*0.1); g.fillStyle='#b89a72';
      for(let i=0;i<8;i++){ const a=i*0.8; g.beginPath();
        g.arc(Math.cos(a)*(14+since*14),12+Math.sin(a)*8,(7+since*6+i)*sc*0.5,0,7); g.fill(); }
      g.globalAlpha=1;
      g.rotate(tip*1.5); g.scale(sc*0.55,sc*0.55);
      g.strokeStyle=shade(h.coat,-40); g.lineWidth=3.8; g.lineCap='round';
      for(let i=0;i<4;i++){ const fx=-13+i*9, kick=Math.sin(state.raceTime*13+i*1.7)*7;
        g.beginPath(); g.moveTo(fx,3); g.lineTo(fx+kick*0.5,-15-Math.abs(kick)); g.stroke(); }
      g.fillStyle=h.coat; g.beginPath(); g.ellipse(0,4,26,12,0,0,7); g.fill();
      g.fillStyle=h.coat; g.beginPath(); g.ellipse(25,2,9,5,0.35,0,7); g.fill();  /* 머리 */
      g.fillStyle=shade(h.coat,-38); g.beginPath(); g.moveTo(21,-2); g.lineTo(20,-8); g.lineTo(24,-2); g.closePath(); g.fill();
      g.restore();
      drawBeacon(g, x+22*sc*0.5, y-14*sc*0.5, sc*0.55);   /* 번쩍이는 경광등 */
    } else {
      /* 모션 블러 잔상 */
      if(running){
        g.save(); g.translate(x-9*sc*0.4,y); g.globalAlpha=0.14;
        drawHorseSprite(g,h,sc*0.55,cyc-0.07,{running,whip:h.whip,t:state.t-0.03});
        g.restore();
      }
      g.save(); g.translate(x,y);
      drawHorseSprite(g,h,sc*0.55,cyc,{running,whip:h.whip,t:state.t});
      g.restore();
    }

    /* 이름표 (모든 말 · 순위 표시) — 이름 길이에 맞춰 박스 폭 계산, 말 중앙 정렬 */
    {
      const ny=y+34*sc*0.55+8+(h.lane%2? 0:20);
      const medal=h.rank<=3?['#f4c430','#c9c9c9','#cd7f32'][h.rank-1]:null;
      const ord=ordinal(h.rank);
      g.font='bold 9px sans-serif';  const ordW=g.measureText(ord).width;
      g.font='bold 11px sans-serif'; const nameW=g.measureText(h.name).width;
      const padL=6, badge=15, gapName=4, padR=8;
      const boxW=padL+badge+ordW+gapName+nameW+padR;
      const boxL=x-boxW/2;
      g.textBaseline='middle';
      g.fillStyle='rgba(8,10,8,.74)';
      g.beginPath(); g.roundRect(boxL,ny,boxW,17,4); g.fill();
      if(medal){ g.strokeStyle=medal; g.lineWidth=1.2; g.stroke(); }
      let cx2=boxL+padL;
      g.fillStyle=h.color; g.beginPath(); g.arc(cx2+6,ny+8.5,6,0,7); g.fill();
      g.fillStyle='#fff'; g.font='bold 9px sans-serif'; g.textAlign='center';
      g.fillText(h.lane,cx2+6,ny+9);
      cx2+=badge;
      g.fillStyle=medal||'#8fa89a'; g.font='bold 9px sans-serif'; g.textAlign='left';
      g.fillText(ord,cx2,ny+9);
      cx2+=ordW+gapName;
      g.fillStyle='#f0f4ea'; g.font='bold 11px sans-serif';
      g.fillText(h.name,cx2,ny+9);
    }
  });

  /* 파티클 갱신/드로우 */
  tv.particles=tv.particles.filter(pt=>{
    pt.life-=dt; if(pt.life<=0) return false;
    pt.vy+=340*dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt;
    g.globalAlpha=Math.min(0.7,pt.life*2);
    g.fillStyle=pt.col;
    g.beginPath(); g.ellipse(pt.x,pt.y,pt.size,pt.size*0.7,0.5,0,7); g.fill();
    return true;
  });
  g.globalAlpha=1;
}

function drawBroadcastOverlay(g,w,hgt,dt,fxDt){
  const tv=state.tv;
  /* 상단 좌: 샷 라벨 */
  g.fillStyle='rgba(6,10,8,.78)';
  g.beginPath(); g.roundRect(12,10,168,28,6); g.fill();
  g.fillStyle='#f4c430'; g.font='bold 14px sans-serif'; g.textAlign='left'; g.textBaseline='middle';
  g.fillText('📷 '+tv.label,22,24);
  /* 상단 우: LIVE */
  g.fillStyle='rgba(6,10,8,.78)';
  g.beginPath(); g.roundRect(w-84,10,72,26,6); g.fill();
  const isReplay=tv.mode==='photo';
  if(Math.sin(state.t*6)>0){ g.fillStyle=isReplay?'#f4c430':'#e33'; g.beginPath(); g.arc(w-68,23,4.5,0,7); g.fill(); }
  g.fillStyle='#fff'; g.font='bold 12px sans-serif';
  g.fillText(isReplay?'REPLAY':'LIVE',w-62,24);
  if(isReplay){
    g.fillStyle='rgba(6,10,8,.78)';
    g.beginPath(); g.roundRect(w-84,42,72,22,6); g.fill();
    g.fillStyle='#7fe9ff'; g.font='bold 11px sans-serif'; g.textAlign='left';
    g.fillText('SLO-MO',w-72,53);
  }
  /* 자막 (해설) — 상단 중앙, 말 이름표와 겹치지 않게 */
  if(state.caption && state.caption.timer>0){
    state.caption.timer-=fxDt;
    const alpha=Math.min(1,state.caption.timer*2);
    g.globalAlpha=alpha;
    g.font='bold 14px sans-serif'; g.textAlign='center'; g.textBaseline='alphabetic';
    const tw=g.measureText(state.caption.text).width+70;
    const cy=44;                       /* 상단(라벨/LIVE 바로 아래) */
    g.fillStyle='rgba(6,10,8,.85)';
    g.beginPath(); g.roundRect(w/2-tw/2,cy,tw,26,5); g.fill();
    g.fillStyle='#f4c430'; g.fillRect(w/2-tw/2,cy,4,26);
    g.fillStyle='#f5f2e6';
    g.fillText(state.caption.text,w/2+2,cy+17);
    g.globalAlpha=1;
  }
  /* 포토피니시 플래시 */
  if(state.flash>0){
    state.flash-=fxDt*1.6;
    g.fillStyle=`rgba(255,255,255,${Math.max(0,state.flash)})`;
    g.fillRect(0,0,w,hgt);
  }
  /* 판독기 셔터 (위아래 블랙 블라인드) */
  if(state.shutter>0){
    state.shutter-=fxDt*1.1;
    const k=clamp(state.shutter/0.3,0,1);
    const hh=hgt*0.5*k;
    g.fillStyle='#000';
    g.fillRect(0,0,w,hh); g.fillRect(0,hgt-hh,w,hh);
  }
  /* 필름 그레인 + 비네트 */
  for(let i=0;i<70;i++){
    g.fillStyle=`rgba(${Math.random()<0.5?255:0},${Math.random()<0.5?255:0},200,.02)`;
    g.fillRect(Math.random()*w,Math.random()*hgt,2,2);
  }
  const vg=g.createRadialGradient(w/2,hgt/2,hgt*0.55,w/2,hgt/2,hgt*1.2);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.42)');
  g.fillStyle=vg; g.fillRect(0,0,w,hgt);
}

/* ============================ 음성 중계 & 효과음 ============================ */
let voiceOn=true, AC=null, audioReady=false;   /* 기본 켜짐 (오디오는 첫 클릭 제스처에서 initAudio로 언락됨) */
/* 브라우저 자동재생 정책: 반드시 사용자 제스처 안에서 AudioContext 생성+resume.
   (주의: speechSynthesis를 volume=0 무음 발화로 "워밍업"하면 Safari 계열에서
   그 발화가 end 이벤트 없이 큐에 걸린 채로 남아, 이후 모든 실제 발화가
   막혀버리는 경우가 있었다 — 그래서 워밍업은 음성 목록 프리로드만 한다.) */
let ttsVoice=null;
function pickVoice(){
  if(!window.speechSynthesis) return;
  const vs=speechSynthesis.getVoices();
  if(!vs||!vs.length) return;
  const en=vs.filter(v=>/^en/i.test(v.lang));
  const pool=en.length?en:vs;
  /* 중년 남성 톤 우선: 알려진 남성 음성 이름 → en-US(여성 제외) → 아무거나 */
  const MALE=/\b(daniel|fred|alex|arthur|aaron|gordon|oliver|thomas|reed|rishi|george|guy|david|mark|male)\b/i;
  ttsVoice = pool.find(v=>MALE.test(v.name))
           || pool.find(v=>/en[-_]US/i.test(v.lang) && !/female|samantha|victoria|karen|moira|tessa|zira/i.test(v.name))
           || pool.find(v=>/en[-_]US/i.test(v.lang))
           || pool[0];
}
if(window.speechSynthesis){
  pickVoice();
  speechSynthesis.onvoiceschanged=pickVoice;
}
function initAudio(){
  if(audioReady) return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    pickVoice();
    crowdPreload();     /* 관중 함성 오디오 미리 버퍼링 */
    audioReady=true;
  }catch(e){}
}
document.addEventListener('pointerdown',initAudio,{capture:true});
/* Chrome은 발화가 길게 이어지면 ~15초 뒤 자동 일시정지되는 고질적 버그가 있어
   레이스 중엔 주기적으로 resume()을 걸어준다 */
setInterval(()=>{ try{ if(window.speechSynthesis && speechSynthesis.speaking) speechSynthesis.resume(); }catch(e){} },4000);

function beep(freq=700,dur=0.12,vol=0.22,type='square'){
  try{
    if(!AC) return;
    if(AC.state==='suspended') AC.resume();
    const t=AC.currentTime;
    const o=AC.createOscillator(), gn=AC.createGain();
    o.type=type; o.frequency.value=freq;
    gn.gain.setValueAtTime(vol,t);
    gn.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(gn); gn.connect(AC.destination);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function gateBell(){ [0,120,240].forEach(d=>setTimeout(()=>beep(1400,0.26,0.2,'triangle'),d)); }
/* 낙마 돌발 효과음: 둔탁한 임팩트 + 관중 헉 소리 */
function fallSound(){
  try{
    if(!AC) return;
    if(AC.state==='suspended') AC.resume();
    const t=AC.currentTime;
    /* 쿵 (저역 임팩트) */
    const o=AC.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(45,t+0.35);
    const g=AC.createGain(); g.gain.setValueAtTime(0.6,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+0.45);
    /* 흙먼지 노이즈 버스트 */
    const dur=0.3, buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const s=AC.createBufferSource(); s.buffer=buf;
    const bp=AC.createBiquadFilter(); bp.type='lowpass'; bp.frequency.value=800;
    const gn=AC.createGain(); gn.gain.value=0.4;
    s.connect(bp); bp.connect(gn); gn.connect(AC.destination); s.start(t+0.02);
  }catch(e){}
}
/* 마지막 바퀴 종: 약 5초간 빠른 땡땡땡 (경마장 종처럼 두 음 교차) */
function finalLapBell(){
  const N_=26, gap=190;   /* 26타 × 190ms ≈ 5초 */
  for(let i=0;i<N_;i++){
    setTimeout(()=>{ if(state.started){ beep(i%2?1560:1180,0.16,0.22,'triangle'); beep(i%2?2340:1770,0.12,0.09,'sine'); } }, i*gap);
  }
}
function printSound(){ for(let i=0;i<9;i++) setTimeout(()=>beep(2200+(i%2)*350,0.03,0.05),i*70); }
function shutterSound(){
  try{
    if(!AC) return;
    if(AC.state==='suspended') AC.resume();
    const a=AC, t=a.currentTime;
    [0,0.14].forEach(d0=>{             /* 찰칵, 찰칵 */
      const dur=0.05;
      const buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.006));
      const s=a.createBufferSource(); s.buffer=buf;
      const gn=a.createGain(); gn.gain.value=0.3;
      s.connect(gn); gn.connect(a.destination);
      s.start(t+d0);
    });
  }catch(e){}
}
/* 관중 함성: 실제 녹음(crowd_loop.mp3 무이음 루프 + crowd_cheer.mp3 골인 환호).
   v(0~1) 강도를 루프 볼륨으로 부드럽게 트윈한다. */
let crowdLoopEl=null, crowdCheerEl=null;
let crowdCurV=0, crowdTargetV=0, crowdRampRate=1, crowdTweenRAF=null, crowdPlaying=false;
const CROWD_MAX=0.9;
let fanfareEl=null;
function crowdPreload(){
  if(crowdLoopEl) return;
  crowdLoopEl=new Audio('crowd_loop.mp3'); crowdLoopEl.loop=true; crowdLoopEl.preload='auto'; crowdLoopEl.volume=0;
  crowdCheerEl=new Audio('crowd_cheer.mp3'); crowdCheerEl.preload='auto';
  fanfareEl=new Audio('fanfare.mp3'); fanfareEl.preload='auto';
}
/* 출발 전 팡파르 */
function playFanfare(vol=0.9){
  crowdPreload();
  try{ fanfareEl.currentTime=0; fanfareEl.volume=clamp(vol,0,1);
    const pr=fanfareEl.play(); if(pr&&pr.catch) pr.catch(()=>{}); }catch(e){}
}
function crowdStart(){
  crowdPreload();
  crowdCurV=0; crowdTargetV=0; crowdPlaying=true;
  try{ crowdLoopEl.currentTime=0; crowdLoopEl.volume=0;
    const pr=crowdLoopEl.play(); if(pr&&pr.catch) pr.catch(()=>{}); }catch(e){}
  if(crowdTweenRAF) cancelAnimationFrame(crowdTweenRAF);
  let last=performance.now();
  const step=now=>{
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    const diff=crowdTargetV-crowdCurV;
    const mv=Math.sign(diff)*Math.min(Math.abs(diff),crowdRampRate*dt);
    crowdCurV=clamp(crowdCurV+mv,0,1);
    if(crowdLoopEl){ try{ crowdLoopEl.volume=clamp(crowdCurV*CROWD_MAX,0,1); }catch(e){} }
    if(crowdPlaying) crowdTweenRAF=requestAnimationFrame(step);
  };
  crowdTweenRAF=requestAnimationFrame(step);
}
function crowdSet(v,ramp=1.0){
  crowdTargetV=clamp(v,0,1);
  crowdRampRate=Math.max(0.2, Math.abs(crowdTargetV-crowdCurV)/Math.max(0.05,ramp));
}
function crowdLevel(v){ crowdSet(v,0.3); }   /* 매 프레임 연속 조절 */
function crowdStop(){
  crowdSet(0,0.9);
  setTimeout(()=>{
    crowdPlaying=false;
    if(crowdTweenRAF){ cancelAnimationFrame(crowdTweenRAF); crowdTweenRAF=null; }
    try{ if(crowdLoopEl) crowdLoopEl.pause(); }catch(e){}
  },1000);
}
/* 골인 순간 큰 환호 원샷 */
function crowdCheer(vol=1){
  crowdPreload();
  try{ crowdCheerEl.currentTime=0; crowdCheerEl.volume=clamp(vol,0,1);
    const pr=crowdCheerEl.play(); if(pr&&pr.catch) pr.catch(()=>{}); }catch(e){}
}

function speak(text,opt={}){
  if(!voiceOn || !window.speechSynthesis) return;
  try{
    speechSynthesis.resume();          /* Chrome/Safari가 cancel 후 pause 상태에 갇히는 버그 대응 */
    const fire=()=>{
      const u=new SpeechSynthesisUtterance(text);
      /* 중년 남성 캐스터: 낮은 피치 기본, 결정적 순간엔 호출부에서 올린다 */
      u.lang='en-US'; u.rate=opt.rate||1.05; u.pitch=opt.pitch||0.82; u.volume=1;
      if(ttsVoice) u.voice=ttsVoice;
      speechSynthesis.speak(u);
    };
    if(speechSynthesis.speaking||speechSynthesis.pending){
      speechSynthesis.cancel();
      setTimeout(()=>{ try{ speechSynthesis.resume(); fire(); }catch(e){} },70);
    } else fire();
  }catch(e){}
}
/* Chrome의 speechSynthesis 정지 버그를 막는 주기적 킥 */
if(window.speechSynthesis){ setInterval(()=>{ try{
  if(voiceOn && speechSynthesis.paused) speechSynthesis.resume();
}catch(e){} },4000); }
function toggleVoice(){
  initAudio();                          /* 버튼 클릭 = 확실한 제스처 → 오디오 언락 겸용 */
  voiceOn=!voiceOn;
  if(!voiceOn && window.speechSynthesis) speechSynthesis.cancel();
  else {
    beep(880,0.15,0.25);
    /* Safari는 제스처와 동기적으로 붙어있지 않은 첫 speak()는 무시하는 경우가 많다 →
       setTimeout 없이 클릭 핸들러 안에서 바로 발화 */
    speak('Sound check! Ladies and gentlemen, welcome to the races!',{rate:1.1,pitch:0.9});
  }
  document.getElementById('voiceBtn').textContent=voiceOn?t('voiceOn'):t('voiceOff');
}

/* ============================ 사진판독 슬로모 리플레이 ============================ */
function startPhotoReplay(){
  cancelAnimationFrame(raf);
  state.finalOrder=raceOrder();        /* 리플레이가 위치를 덮어쓰기 전에 확정 착순 보존 */
  const R=state.replay;
  if(!R || R.frames.length<5 || !state.crossTimes[1]){ finishRace(); return; }
  cap('사진 판독 — 골인 장면 리플레이','Photo finish — replay');
  speak("Oh, what a finish! Let's go to the photo!",{rate:1.2,pitch:0.95});
  crowdSet(0.4,0.8);
  const lastCross=state.crossTimes[3]||state.crossTimes[2]||state.crossTimes[1];
  state.photo={
    t:Math.max(R.frames[0].rt, state.crossTimes[1]-1.8),
    pause:1.0, nextCross:1, fi:0,
    endT:lastCross+0.7,
  };
  state.confirmed=0;   /* 확정된 상위 순위 수 (중앙 표시용) */
  const sb=document.getElementById('skipBtn'); if(sb) sb.classList.add('show');   /* 판독 중 결과 스킵 */
  const tv=state.tv;
  tv.mode='photo'; tv.label='PHOTO FINISH'; tv.prevFocus=null; tv.prevTarget=null;
  tv.targetScale=2.7;
  state.last=performance.now();
  photoLoop();
}

function applyReplayFrame(t){
  const F=state.replay.frames;
  let i=state.photo.fi||0;
  while(i<F.length-2 && F[i+1].rt<=t) i++;
  while(i>0 && F[i].rt>t) i--;
  state.photo.fi=i;
  const a=F[i], b=F[Math.min(F.length-1,i+1)];
  const k=b.rt>a.rt? clamp((t-a.rt)/(b.rt-a.rt),0,1) : 0;
  state.horses.forEach((h,j)=>{
    h.dist=a.d[j][0]+(b.d[j][0]-a.d[j][0])*k;
    h.off =a.d[j][1]+(b.d[j][1]-a.d[j][1])*k;
    h.finished=false; h.whip=true;     /* 리플레이 중엔 전력 질주 모습 */
  });
}

function photoLoop(){
  const now=performance.now();
  let rdt=(now-state.last)/1000; state.last=now; rdt=Math.min(rdt,0.05);
  state.t+=rdt;
  const P=state.photo;
  let simDt=0;
  if(P.pause>0){
    P.pause-=rdt;                      /* 순간 정지 */
  } else {
    /* 다음 착순 통과가 임박하면 슬로모, 아니면 빠르게 넘겨 지루함을 줄인다 */
    const ct=state.crossTimes[P.nextCross];
    const near = ct!=null && (ct-P.t)<0.55;
    simDt=rdt*(near?0.20:0.9);
    P.t+=simDt;
    if(ct && P.t>=ct && P.nextCross<=3){
      P.t=ct; P.pause=0.95;            /* 코끝이 결승선에 닿는 순간 프리즈! */
      state.flash=0.9; state.shutter=0.3;
      shutterSound();
      const h=state.finalOrder[P.nextCross-1];
      state.confirmed=P.nextCross;   /* 확정 → 트랙 중앙에 표시 */
      const medalKo=['🥇 1착','🥈 2착','🥉 3착'][P.nextCross-1];
      const medalEn=['🥇 1st','🥈 2nd','🥉 3rd'][P.nextCross-1];
      cap(`${medalKo} 확정 — ${h.lane}번 ${h.name}`,`${medalEn} — ${laneNo(h.lane)} ${h.name}`);
      speak(P.nextCross===1? `First across the line, number ${h.lane}, ${h.name}!`
           :P.nextCross===2? `Second place, number ${h.lane}.`
           :`And third, number ${h.lane}. What a race, folks!`,
           {rate:P.nextCross===1?1.3:1.12, pitch:P.nextCross===1?1.0:0.9});
      P.nextCross++;
    }
  }
  applyReplayFrame(P.t);
  const tv=state.tv;
  tv.camDist=state.finishDist-8;       /* 판독 카메라: 결승선 고정 */
  tv.scale+=(tv.targetScale-tv.scale)*Math.min(1,rdt*2);

  drawTrackBase();
  drawPrints(simDt);
  [...state.horses].sort((a,b)=> pointAt(a.dist,a.off).y-pointAt(b.dist,b.off).y)
    .forEach(h=>drawHorseOnTrack(h,true));
  drawParkedHorses();   /* 확정된 1·2·3위를 트랙 중앙에 표시 */
  drawTV(simDt,rdt);

  const framesEnd=P.t>=state.replay.frames[state.replay.frames.length-1].rt;
  if(P.pause<=0 && (P.t>=P.endT || framesEnd)){ finishRace(); return; }
  raf=requestAnimationFrame(photoLoop);
}

/* ============================ 코인 애니메이션 ============================ */
function tweenNumber(el,from,to,dur=1000,suffix=' <span class="cn"></span>'){
  const t0=performance.now();
  function f(t){
    const k=Math.min(1,(t-t0)/dur);
    const e=1-Math.pow(1-k,3);
    el.innerHTML=Math.round(from+(to-from)*e).toLocaleString()+suffix;
    if(k<1) requestAnimationFrame(f);
  }
  requestAnimationFrame(f);
}
function coinBurst(container,n){
  const rect=container.getBoundingClientRect();
  for(let i=0;i<n;i++){
    const c=document.createElement('div'); c.className='coin';
    c.style.left=(8+Math.random()*(rect.width-24))+'px';
    c.style.setProperty('--dx',(Math.random()*120-60)+'px');
    c.style.animationDelay=(Math.random()*0.7)+'s';
    container.appendChild(c);
    setTimeout(()=>c.remove(),2400);
  }
}

/* ============================ 결과 ============================ */
function judgeBet(b,o1,o2){
  const s=b.sel;
  if(b.type==='win')      return s[0]===o1;
  if(b.type==='place')    return s[0]===o1||s[0]===o2;
  if(b.type==='quinella') return (s[0]===o1&&s[1]===o2)||(s[0]===o2&&s[1]===o1);
  if(b.type==='exacta')   return s[0]===o1&&s[1]===o2;
  return false;
}

function h_disp(h){
  return `${h.lane}. <span style="color:#fff">${h.name}</span> <span style="font-size:15px;color:#9fe6b3">(${h.jockey})</span>`;
}
/* 결과 화면 정지 말 초상 (녹색 잔디 배경) */
function renderResultHorse(cv,h,scale){
  if(!cv||!h) return;
  const g=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  const gr=g.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#8fb0c0'); gr.addColorStop(0.5,'#5f8f57'); gr.addColorStop(1,'#3f6a3a');
  g.fillStyle=gr; g.fillRect(0,0,W,H);
  g.save(); g.translate(W/2, H*0.78);
  g.globalAlpha=.3; g.fillStyle='#20140a';
  g.beginPath(); g.ellipse(1,4,26*scale,5*scale,0,0,7); g.fill(); g.globalAlpha=1;
  drawHorseSprite(g,h,scale,0.24,{running:false});
  g.restore();
}

function finishRace(){
  cancelAnimationFrame(raf);
  crowdStop();
  const sb=document.getElementById('skipBtn'); if(sb) sb.classList.remove('show');
  const finalOrder=state.finalOrder||raceOrder();
  const winner=finalOrder[0];
  const o1=finalOrder[0].lane, o2=finalOrder[1].lane;
  const before=[...state.money];

  const lines=[];
  for(let p=0;p<state.players;p++){
    const b=state.bets[p];
    if(!b){ lines.push({p,text:t('noBet'),delta:0}); continue; }
    const won=judgeBet(b,o1,o2);
    if(won){
      const payout=Math.round(b.stake*b.odds);
      state.money[p]+=payout;
      lines.push({p,won:true,text:`${betName(b.type)} ${t('hit')} ${selLabel(b)} · ${b.stake.toLocaleString()}<span class="cn"></span> × ${b.odds.toFixed(1)}`,delta:payout});
    } else {
      lines.push({p,won:false,text:`${betName(b.type)} ${t('miss')} · ${selLabel(b)}`,delta:-b.stake,stake:b.stake});
    }
  }
  state.peak=Math.max(state.peak||START_MONEY, ...state.money.slice(0,state.players));

  const panel=document.getElementById('resultPanel');
  const top3=finalOrder.slice(0,3);
  const podHTML=top3.map((h,i)=>{
    const rk=i+1;
    return `<div class="pod r${rk}">
      <canvas class="podHorse" data-lane="${h.lane}" width="200" height="132"></canvas>
      <div class="podName">${h.lane}. ${h.name}</div>
      <div class="podJockey">🧑 ${h.jockey}</div>
      <div class="podBlock">${['🥇','🥈','🥉'][i]}</div>
    </div>`;
  }).join('');

  let html=`<div class="sub">${t('raceR')}${state.round} ${t('result')} · ${state.raceTime.toFixed(1)}${state.lang==='en'?'s':'초'}</div>
    <div class="winner">${t('champion')}: ${h_disp(winner)}</div>
    <div class="podium">${podHTML}</div>`;

  /* 착순 리스트는 4위부터 (1·2·3위는 위 포디엄에 표시) */
  const rest=finalOrder.slice(3);
  if(rest.length){
    html+=`<div class="finishlist">`+rest.map((h,i)=>{
      const ret=h.fallen||h.retired;
      const badge=ret?'🚑':ordinal(i+4);
      return `<div class="fr"><span class="frRk">${badge}</span>
        <canvas class="frHorse" data-lane="${h.lane}" width="104" height="60"></canvas>
        <span>${h.lane}. ${h.name}</span>
        <span style="opacity:.55">· ${ret?t('retire'):h.styleName} · ${betName('win')} ${h.odds.toFixed(1)}</span></div>`;
    }).join('')+`</div>`;
  }

  html+=lines.map((l,i)=>{
    const who=state.players===2? `<b style="color:${l.p===0?'var(--p1)':'var(--p2)'}">P${l.p+1}</b>` : '';
    if(l.delta===0) return `<div class="payline">${who}<span>${l.text}</span><span style="opacity:.6">±0</span></div>`;
    if(l.won) return `<div class="payline">${who}<span>${l.text}</span><b class="pos" id="payval-${i}">+0 <span class="cn"></span></b></div>`;
    return `<div class="payline lose">${who}<span>${l.text}</span><b class="neg">-${l.stake.toLocaleString()}<span class="cn"></span></b></div>`;
  }).join('');

  html+=`<div style="margin-top:12px" class="row">`+[...Array(state.players).keys()].map(p=>
    `<div class="wallet ${p===0?'p1':'p2'}" id="rwallet-${p}"><small>${state.players===2?t('player')+' '+(p+1):t('coins')}</small><span id="rwalletv-${p}">${before[p].toLocaleString()} <span class="cn"></span></span></div>`
  ).join('')+`</div>`;

  const broke=state.money.slice(0,state.players).every(m=>m<100);
  /* 1) 다음 경기/메인 메뉴 (먼저) */
  if(broke){
    html+=`<div class="broke">${t('gameOver')}</div>
      <div class="row" style="margin-top:12px">
        <button class="btn" onclick="startGame(${state.players})">${t('restart')}</button>
        <button class="btn ghost" onclick="show('screen-start')">${t('toMain')}</button></div>`;
  } else {
    html+=`<div class="row" style="margin-top:14px">
        <button class="btn" onclick="nextRace()">${t('nextRace')}</button>
        <button class="btn ghost" onclick="show('screen-start')">${t('toMain')}</button></div>
      <div class="hint" style="margin-top:8px">${t('spectateNote')}</div>`;
  }
  /* 2) 명예의 전당 (메뉴 아래, 1인 플레이 전용) */
  if(state.players===1){
    html+=`<div class="saverow" id="saveArea" style="margin-top:16px">
        <input id="nickInput" maxlength="14" placeholder="${t('nickname')}" value="${state.myNick||''}">
        <button class="chip" onclick="saveScore()">${t('save')}</button>
      </div>
      <div style="font-weight:800;color:var(--gold);margin-top:4px">${t('leaderboard')}</div>
      <div class="lb" id="lbBox"></div>`;
  }
  panel.innerHTML=html;
  show('screen-result');
  /* 포디엄·착순 미니 말 초상 렌더 */
  panel.querySelectorAll('.podHorse').forEach(cv=>{
    const h=state.horses.find(x=>x.lane===+cv.dataset.lane); renderResultHorse(cv,h,1.15);
  });
  panel.querySelectorAll('.frHorse').forEach(cv=>{
    const h=state.horses.find(x=>x.lane===+cv.dataset.lane); renderResultHorse(cv,h,0.62);
  });
  if(state.players===1) renderLeaderboard();

  /* --- 코인 정산 애니메이션 --- */
  let anyWin=false;
  lines.forEach((l,i)=>{
    if(!l.won) return;
    anyWin=true;
    const el=document.getElementById(`payval-${i}`);
    if(el){ setTimeout(()=>{
      const t0=performance.now();
      (function f(t){ const k=Math.min(1,(t-t0)/1100); const e=1-Math.pow(1-k,3);
        el.innerHTML='+'+Math.round(l.delta*e).toLocaleString()+' <span class="cn"></span>';
        if(k<1) requestAnimationFrame(f); })(t0);
    },350); }
  });
  for(let p=0;p<state.players;p++){
    const wEl=document.getElementById(`rwallet-${p}`);
    const vEl=document.getElementById(`rwalletv-${p}`);
    if(!wEl||!vEl) continue;
    if(state.money[p]!==before[p]){
      setTimeout(()=>{
        wEl.classList.add(state.money[p]>before[p]?'flash-up':'flash-down');
        tweenNumber(vEl,before[p],state.money[p],1200);
        setTimeout(()=>wEl.classList.remove('flash-up','flash-down'),1600);
      },500);
    }
  }
  if(anyWin) setTimeout(()=>coinBurst(panel,26),400);
}
</script>
